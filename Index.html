function mockStock(ticker){

    avgVolume:Math.floor(rng(seed*9)*30e6+1e6),volumeSpike:false,
    newsHeadlines:[],earningsDate:null,earningsTime:null};

function calcEMA(arr,period){
  if(!arr||arr.length<period) return null;
  const k=2/(period+1);
  let ema=arr.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<arr.length;i++) ema=arr[i]*k+ema*(1-k);
  return ema;
}

function calcRSI(closes,period=14){
  if(!closes||closes.length<period+1) return 50;
  let gains=0,losses=0;
  for(let i=closes.length-period;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses+=Math.abs(d);
  }
  const ag=gains/period,al=losses/period;
  return al===0?100:Math.round(100-(100/(1+ag/al)));
}

function calcMACD(closes){
  if(!closes||closes.length<26) return{macd:null,signal:null,hist:null};
  const ema12=calcEMA(closes,12),ema26=calcEMA(closes,26);
  if(!ema12||!ema26) return{macd:null,signal:null,hist:null};
  const macd=ema12-ema26;
  // simplified signal
  const signal=macd*0.9;
  return{macd:parseFloat(macd.toFixed(3)),signal:parseFloat(signal.toFixed(3)),hist:parseFloat((macd-signal).toFixed(3))};
}

function calcBollinger(closes,period=20){
  if(!closes||closes.length<period) return{upper:null,lower:null,mid:null};
  const slice=closes.slice(-period);
  const mid=slice.reduce((a,b)=>a+b,0)/period;
  const std=Math.sqrt(slice.reduce((a,b)=>a+(b-mid)**2,0)/period);
  return{upper:parseFloat((mid+2*std).toFixed(2)),lower:parseFloat((mid-2*std).toFixed(2)),mid:parseFloat(mid.toFixed(2))};
}

function getSupportResistance(highs,lows,current){
  if(!highs||!lows||highs.length<5) return{support:null,resistance:null};
  const recentLows=lows.slice(-20).sort((a,b)=>a-b);
  const recentHighs=highs.slice(-20).sort((a,b)=>b-a);
  const support=recentLows.slice(0,3).reduce((a,b)=>a+b,0)/3;
  const resistance=recentHighs.slice(0,3).reduce((a,b)=>a+b,0)/3;
  return{support:parseFloat(support.toFixed(2)),resistance:parseFloat(resistance.toFixed(2))};
}

// ── New comprehensive signal + confidence system ───────────────────────────────
// Returns direction (BULLISH/BEARISH/NEUTRAL) AND confidence (STRONG/MODERATE/WEAK)
// based on all available chart data, price movement, and sentiment
function getSignalAndConfidence(d){
  let bullPoints=0, bearPoints=0;
  const reasons=[];

  // 1. Price vs 50-day trend (strong weight)
  if(d.ma50){
    if(d.price>d.ma50){ bullPoints+=2; reasons.push({bull:true,txt:"Price above 50-day trend"}); }
    else{ bearPoints+=2; reasons.push({bull:false,txt:"Price below 50-day trend"}); }
  }
  // 2. Price vs 200-day trend (strong weight — long term direction)
  if(d.ma200){
    if(d.price>d.ma200){ bullPoints+=2; reasons.push({bull:true,txt:"Price above 200-day trend"}); }
    else{ bearPoints+=2; reasons.push({bull:false,txt:"Price below 200-day trend"}); }
  }
  // 3. MACD momentum crossover
  if(d.macdHist!=null){
    if(d.macdHist>0){ bullPoints+=2; reasons.push({bull:true,txt:"Buying momentum building"}); }
    else{ bearPoints+=2; reasons.push({bull:false,txt:"Selling momentum building"}); }
  }
  // 4. RSI — overbought/oversold
  if(d.rsi){
    if(d.rsi<30){ bullPoints+=2; reasons.push({bull:true,txt:"Oversold — potential bounce"}); }
    else if(d.rsi>70){ bearPoints+=2; reasons.push({bull:false,txt:"Overbought — potential pullback"}); }
    else if(d.rsi>=45&&d.rsi<=65){ bullPoints+=1; reasons.push({bull:true,txt:"RSI in healthy range"}); }
  }
  // 5. Today's price movement
  if(d.change>1.5){ bullPoints+=1; reasons.push({bull:true,txt:"Strong up move today"}); }
  else if(d.change<-1.5){ bearPoints+=1; reasons.push({bull:false,txt:"Strong down move today"}); }
  // 6. Intraday momentum (where price closed in day's range)
  if(d.momentum>70){ bullPoints+=1; reasons.push({bull:true,txt:"Closed near day's high"}); }
  else if(d.momentum<30){ bearPoints+=1; reasons.push({bull:false,txt:"Closed near day's low"}); }
  // 7. Bollinger Band position
  if(d.bbUpper&&d.bbLower){
    const bbRange=d.bbUpper-d.bbLower;
    const bbPos=bbRange>0?(d.price-d.bbLower)/bbRange:0.5;
    if(bbPos<0.2){ bullPoints+=1; reasons.push({bull:true,txt:"Near bottom of price range"}); }
    else if(bbPos>0.8){ bearPoints+=1; reasons.push({bull:false,txt:"Near top of price range"}); }
  }
  // 8. Price vs support/resistance
  if(d.support&&d.resistance){
    const mid=(d.support+d.resistance)/2;
    if(d.price>mid){ bullPoints+=1; reasons.push({bull:true,txt:"Price above midpoint"}); }
    else{ bearPoints+=1; reasons.push({bull:false,txt:"Price below midpoint"}); }
  }
  // 9. News sentiment
  if(d.sentiment==="bullish"){ bullPoints+=1; reasons.push({bull:true,txt:"Positive news sentiment"}); }
  else if(d.sentiment==="bearish"){ bearPoints+=1; reasons.push({bull:false,txt:"Negative news sentiment"}); }
  // 10. Volume spike adds conviction
  if(d.volumeSpike){
    if(bullPoints>bearPoints){ bullPoints+=1; reasons.push({bull:true,txt:"Unusual volume confirms move"}); }
    else if(bearPoints>bullPoints){ bearPoints+=1; reasons.push({bull:false,txt:"Unusual volume confirms drop"}); }
  }

  const total=bullPoints+bearPoints;
  const diff=Math.abs(bullPoints-bearPoints);
  const isBull=bullPoints>bearPoints;

  // Direction
  let label,color,emoji;
  if(diff<2||total===0){label="NEUTRAL";color="#8899bb";emoji="◆";}
  else if(isBull){label="BULLISH";color="#00c896";emoji="▲";}
  else{label="BEARISH";color="#f0465a";emoji="▼";}

  // Confidence — how many signals agree vs disagree
  const agreePct=total>0?Math.round((Math.max(bullPoints,bearPoints)/total)*100):50;
  let confidence,confColor,confScore;
  if(agreePct>=75&&diff>=4){confidence="STRONG";confColor="#00c896";confScore=3;}
  else if(agreePct>=60&&diff>=2){confidence="MODERATE";confColor="#f59e0b";confScore=2;}
  else{confidence="WEAK";confColor="#f0465a";confScore=1;}

  // Earnings upcoming = always reduce confidence (too much uncertainty)
  if(d.earningsDays<14&&d.earningsDays<999){
    if(confidence==="STRONG") confidence="MODERATE";
    confScore=Math.max(1,confScore-1);
  }

  return{label,color,emoji,confidence,confColor,confScore,bullPoints,bearPoints,reasons,agreePct};
}

// Sort score: higher = show first. Bullish Strong=6, Bearish Strong=5, Bull Mod=4, Bear Mod=3, Bull Weak=2, Bear Weak=1, Neutral=0
function getSortScore(d){
  const {label,confidence,confScore}=getSignalAndConfidence(d);
  if(label==="NEUTRAL") return 0;
  const base=label==="BULLISH"?confScore*2:confScore*2-1;
  return base;
}

// ── Finnhub ───────────────────────────────────────────────────────────────────
async function fetchQuote(ticker){
  try{
    const [qR,eR,nR,cR]=await Promise.all([
      fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_KEY}`),
      fetch(`https://finnhub.io/api/v1/calendar/earnings?symbol=${ticker}&token=${FINNHUB_KEY}`),
      fetch(`https://finnhub.io/api/v1/company-news?symbol=${ticker}&from=${getDateStr(-7)}&to=${getDateStr(0)}&token=${FINNHUB_KEY}`),
      fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${ticker}&resolution=D&from=${Math.floor(Date.now()/1000)-86400*220}&to=${Math.floor(Date.now()/1000)}&token=${FINNHUB_KEY}`)
    ]);
    const q=await qR.json(),e=await eR.json(),news=await nR.json(),candles=await cR.json();
    if(!q.c||q.c===0) return null;

    // earnings
    let earningsDays=999,earningsDate=null,earningsTime=null;
    if(e.earningsCalendar?.length>0){
      const nx=e.earningsCalendar.find(x=>new Date(x.date)>=new Date());
      if(nx){earningsDays=Math.round((new Date(nx.date)-new Date())/86400000);earningsDate=nx.date;earningsTime=nx.hour;}
    }

    // sentiment
    let bull=0,bear=0;const headlines=[];
    if(Array.isArray(news)){
      news.slice(0,10).forEach(n=>{
        const t=(n.headline||"").toLowerCase();
        const b=["surge","jump","beat","rise","gain","growth","record","upgrade","strong","bullish","rally","soar"].some(w=>t.includes(w));
        const bd=["fall","drop","miss","decline","loss","cut","downgrade","weak","bearish","crash","slump","disappoint"].some(w=>t.includes(w));
        if(b) bull++;if(bd) bear++;
        if(headlines.length<3) headlines.push({headline:n.headline,url:n.url,sentiment:b?"bullish":bd?"bearish":"neutral",source:n.source});
      });
    }
    const sentiment=bull>bear?"bullish":bear>bull?"bearish":"neutral";
    const sentimentScore=bull+bear>0?Math.round((bull/(bull+bear))*100):50;

    // candle-based indicators
    let rsi=50,ma50=null,ma200=null,macd=null,macdSignal=null,macdHist=null,bbUpper=null,bbLower=null,bbMid=null,support=null,resistance=null,avgVolume=null,volumeSpike=false;
    if(candles.s==="ok"&&candles.c?.length>=15){
      const c=candles.c,h=candles.h,l=candles.l,v=candles.v;
      rsi=calcRSI(c);
      if(c.length>=50)  ma50=parseFloat(calcEMA(c,50).toFixed(2));
      if(c.length>=200) ma200=parseFloat(calcEMA(c,200).toFixed(2));
      const m=calcMACD(c);macd=m.macd;macdSignal=m.signal;macdHist=m.hist;
      const bb=calcBollinger(c);bbUpper=bb.upper;bbLower=bb.lower;bbMid=bb.mid;
      const sr=getSupportResistance(h,l,q.c);support=sr.support;resistance=sr.resistance;
      if(v&&v.length>0){avgVolume=Math.round(v.slice(-20).reduce((a,b)=>a+b,0)/Math.min(20,v.length));volumeSpike=q.v?q.v>avgVolume*1.5:false;}
    }

    const change=q.pc>0?((q.c-q.pc)/q.pc)*100:0;
    const dayRange=(q.h||0)-(q.l||0);
    const momentum=dayRange>0?Math.min(100,Math.max(0,((q.c-q.l)/dayRange)*100)):50;

    return{ticker,live:true,ivLive:false,price:q.c,change,open:q.o,high:q.h,low:q.l,prevClose:q.pc,
      volume:q.v,avgVolume,volumeSpike,momentum,ivRank:null,earningsDays,earningsDate,earningsTime,
      rsi,sentiment,sentimentScore,newsHeadlines:headlines,
      ma50,ma200,macd,macdSignal,macdHist,bbUpper,bbLower,bbMid,support,resistance};
  }catch{return null;}
}

    const r=await fetch(`https://api.flashalpha.com/v1/iv?symbol=${ticker}`,{headers:{"X-API-Key":FLASHALPHA_KEY}});
    if(!r.ok) return null;
    const d=await r.json();
    const ivRank=d.iv_rank??d.ivRank??d.iv_percentile??null;
    return ivRank!==null?{ivRank,iv:d.iv??null}:null;
  }catch{return null;}
}

async function fetchEarnings(tickers){
  try{
    const r=await fetch(`https://finnhub.io/api/v1/calendar/earnings?from=${getDateStr(0)}&to=${getDateStr(21)}&token=${FINNHUB_KEY}`);
    const d=await r.json();
    if(!d.earningsCalendar) return[];
    return d.earningsCalendar.filter(e=>tickers.includes(e.symbol)).map(e=>({
      ticker:e.symbol,date:e.date,hour:e.hour,
      daysAway:Math.round((new Date(e.date)-new Date())/86400000)
    })).sort((a,b)=>a.daysAway-b.daysAway);
  }catch{return[];}
}

async function loadAllStocks(extra,onProg){
  const tickers=[...new Set([...ALL_TICKERS,...extra])];
  const results=[];let flashUsed=0;
  for(let i=0;i<tickers.length;i++){
    const t=tickers[i];
    if(onProg) onProg(i+1,tickers.length,t);
    let d=await fetchQuote(t)||mockStock(t);
    if(d.live&&flashUsed<5){
      const iv=await fetchFlashIV(t);
      if(iv){d.ivRank=iv.ivRank;d.ivLive=true;flashUsed++;}
    }
    if(d.ivRank===null){const s=t.split("").reduce((a,c)=>a+c.charCodeAt(0),0);d.ivRank=((Math.sin(s*6)*10000)%1+1)/2*100;}
    results.push(d);
    if(i<tickers.length-1) await new Promise(r=>setTimeout(r,150));
  }
  return results;
}

async function callClaude(sys,usr){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,system:sys,messages:[{role:"user",content:usr}]})});
    const d=await r.json();
    const text=d.content?.find(b=>b.type==="text")?.text||"{}";
    return JSON.parse(text.replace(/```json|```/g,"").trim());
  }catch{return null;}
}

async function getChartAnalysis(data){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,
        system:`You are a friendly trading coach explaining a stock chart to someone who is brand new to trading. 
NEVER use technical jargon without explaining it in plain English right away.
NEVER say "MA50", "MA200", "MACD", "RSI", "Bollinger Bands" without immediately explaining what it means in simple terms.
Write like you're texting a smart friend who knows nothing about trading. Keep it conversational, honest, and clear.
End with a simple bottom line: is this a good time to buy calls, buy puts, or wait?
Respond with plain text only — no JSON, no bullet points, no headers. Just 4-6 natural flowing sentences.`,
        messages:[{role:"user",content:`Give me a plain English chart reading for ${data.ticker}. Here is the data:

Current price: $${data.price?.toFixed(2)}
Today's change: ${data.change?.toFixed(2)}%
Recent momentum: ${data.momentum?.toFixed(0)}/100 (100 = very strong upward move today, 0 = very weak)

50-day trend line (average price over last 50 days): $${data.ma50||"not enough data"}
200-day trend line (average price over last 200 days): $${data.ma200||"not enough data"}
Price vs 50-day trend: ${data.ma50?(data.price>data.ma50?"ABOVE (bullish sign)":"BELOW (bearish sign)"):"unknown"}
Price vs 200-day trend: ${data.ma200?(data.price>data.ma200?"ABOVE (bullish long term)":"BELOW (bearish long term)"):"unknown"}

Momentum crossover signal: ${data.macdHist!=null?(data.macdHist>0?"BULLISH (buying momentum building)":"BEARISH (selling momentum building)"):"not available"}

Price trading range (Bollinger Bands):
- Upper boundary: $${data.bbUpper||"N/A"} (if price is near here, stock may be getting expensive)
- Middle: $${data.bbMid||"N/A"}
- Lower boundary: $${data.bbLower||"N/A"} (if price is near here, stock may be cheap/oversold)
- Current price position: ${data.bbUpper&&data.bbLower?(data.price>data.bbUpper?"Near the TOP of range — possibly overbought":data.price<data.bbLower?"Near the BOTTOM of range — possibly oversold":"In the MIDDLE of range — neutral"):"unknown"}

Strength indicator (RSI): ${data.rsi?.toFixed(0)}/100 ${data.rsi>70?"(above 70 = stock may be overbought, could pull back)":data.rsi<30?"(below 30 = stock may be oversold, could bounce)":"(between 30-70 = healthy range)"}

Key price levels:
- Support (where buyers usually step in): $${data.support||"N/A"}
- Resistance (where sellers usually step in): $${data.resistance||"N/A"}

News sentiment: ${data.sentiment} 
Volume spike today: ${data.volumeSpike?"YES — unusual activity, something may be happening":"No"}
Earnings coming up: ${data.earningsDays<999?`In ${data.earningsDays} days — this is important for options!`:"Not imminent"}

Explain all of this in plain English like talking to a friend. No jargon. What does the chart say about where this stock might go?`}]})});
    const d=await r.json();
    return d.content?.find(b=>b.type==="text")?.text||"Could not generate analysis.";
  }catch{return "Could not connect to analysis engine. Check your connection.";}
}

// ── Fetch candle + news data independently (works 24/7, no live quote needed) ──
async function fetchHistoricalData(ticker){
  try{
    const from=Math.floor(Date.now()/1000)-86400*220; // 220 days back
    const to=Math.floor(Date.now()/1000);
    const [cRes,nRes,eRes]=await Promise.all([
      fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${ticker}&resolution=D&from=${from}&to=${to}&token=${FINNHUB_KEY}`),
      fetch(`https://finnhub.io/api/v1/company-news?symbol=${ticker}&from=${getDateStr(-7)}&to=${getDateStr(0)}&token=${FINNHUB_KEY}`),
      fetch(`https://finnhub.io/api/v1/calendar/earnings?symbol=${ticker}&token=${FINNHUB_KEY}`)
    ]);
    const candles=await cRes.json();
    const news=await nRes.json();
    const earnings=await eRes.json();

    if(candles.s!=="ok"||!candles.c?.length) return null;

    const closes=candles.c;
    const highs=candles.h;
    const lows=candles.l;
    const lastClose=closes[closes.length-1];
    const prevClose=closes[closes.length-2]||lastClose;
    const change=prevClose>0?((lastClose-prevClose)/prevClose)*100:0;

    // All indicators from historical data
    const rsi=calcRSI(closes);
    const ma50=closes.length>=50?parseFloat(calcEMA(closes,50).toFixed(2)):null;
    const ma200=closes.length>=200?parseFloat(calcEMA(closes,200).toFixed(2)):null;
    const {macd:macdVal,signal:macdSig,hist:macdHist}=calcMACD(closes);
    const {upper:bbUpper,lower:bbLower,mid:bbMid}=calcBollinger(closes);
    const {support,resistance}=getSupportResistance(highs,lows,lastClose);

    // Sentiment from news
    let bull=0,bear=0;
    if(Array.isArray(news)){
      news.slice(0,10).forEach(n=>{
        const t=(n.headline||"").toLowerCase();
        if(["surge","jump","beat","rise","gain","growth","upgrade","strong","bullish","rally","soar"].some(w=>t.includes(w))) bull++;
        if(["fall","drop","miss","decline","loss","cut","downgrade","weak","bearish","crash","slump","disappoint"].some(w=>t.includes(w))) bear++;
      });
    }
    const sentiment=bull>bear?"bullish":bear>bull?"bearish":"neutral";
    const sentimentScore=bull+bear>0?Math.round((bull/(bull+bear))*100):50;

    // Earnings
    let earningsDays=999;
    if(earnings.earningsCalendar?.length>0){
      const nx=earnings.earningsCalendar.find(x=>new Date(x.date)>=new Date());
      if(nx) earningsDays=Math.round((new Date(nx.date)-new Date())/86400000);
    }

    // Day range momentum from last candle
    const dayRange=(highs[highs.length-1]||0)-(lows[lows.length-1]||0);
    const momentum=dayRange>0?Math.min(100,Math.max(0,((lastClose-lows[lows.length-1])/dayRange)*100)):50;

    return{
      ticker,live:false,historical:true,
      price:lastClose,prevClose,change,momentum,
      rsi,ma50,ma200,macd:macdVal,macdSignal:macdSig,macdHist,
      bbUpper,bbLower,bbMid,support,resistance,
      sentiment,sentimentScore,earningsDays,
      ivRank:null,ivLive:false,newsHeadlines:[]
    };
  }catch{return null;}
}

async function genEODPicks(stocks){
  // Step 1: fetch real historical data for top tickers independently
  // This works 24/7 — candle history and news are always available
  // Scan best representatives from every sector for maximum recommendation quality
  const TOP_TICKERS=[
    // AI Chips & Hardware (most liquid, best data)
    "NVDA","AMD","AVGO","TSM","ARM","ASML","MU","SMCI",
    // AI Software
    "PLTR","MSFT","GOOGL","META","AMZN","NOW","NET","SOUN",
    // Quantum
    "IONQ","RGTI","QUBT","QBTS",
    // Space & LEO
    "RKLB","ASTS",
    // Nuclear & Energy
    "CEG","CCJ","OKLO","SMR","NNE","VST","FSLR","NEE",
    // EV & Battery
    "TSLA","RIVN","QS",
    // Commodities & Minerals
    "GLD","SLV","USO","COPX","MP","UUUU","NEM","WPM",
    // Macro
    "SPY","QQQ","TLT","MSTR","COIN",
    // Robotics
    "ISRG","PATH",
    // Photonics
    "LITE","COHR"
  ];
  const loading=[];
  for(let i=0;i<Math.min(30,TOP_TICKERS.length);i++){
    loading.push(fetchHistoricalData(TOP_TICKERS[i]));
    await new Promise(r=>setTimeout(r,120)); // throttle
  }
  const historicalResults=await Promise.all(loading);

  // Step 2: merge with existing stocks data — prefer historical if live isn't available
  const merged=TOP_TICKERS.map((t,i)=>{
    const hist=historicalResults[i];
    const existing=stocks.find(s=>s.ticker===t);
    // If we have real historical candles use them, otherwise fall back to existing
    if(hist&&(hist.ma50||hist.ma200||hist.macdHist!=null)){
      // Fill in ivRank from existing if available
      if(existing?.ivRank) hist.ivRank=existing.ivRank;
      else{const seed=t.split("").reduce((a,c)=>a+c.charCodeAt(0),0);hist.ivRank=((Math.sin(seed*6)*10000)%1+1)/2*100;}
      return hist;
    }
    return existing||null;
  }).filter(Boolean);

  // Step 3: build rich data string for Claude
  const dataStr=merged.map(s=>{
    const sig=getSignalAndConfidence(s);
    const hasRealChart=s.historical||s.ma50||s.ma200;
    return`${s.ticker} (${getCompanyName(s.ticker)}) [${getSector(s.ticker)}]:
  Last close: $${s.price?.toFixed(2)} | Prev close: $${s.prevClose?.toFixed(2)||"N/A"} | Change: ${s.change?.toFixed(2)}%
  50-day trend: ${s.ma50?"$"+s.ma50+" (price is "+(s.price>s.ma50?"ABOVE — bullish":"BELOW — bearish")+")":"not enough data"}
  200-day trend: ${s.ma200?"$"+s.ma200+" (price is "+(s.price>s.ma200?"ABOVE — healthy long term":"BELOW — bearish long term")+")":"not enough data"}
  Momentum (MACD): ${s.macdHist!=null?(s.macdHist>0?"Buying momentum is building (bullish)":"Selling momentum is building (bearish)"):"not available"}
  Overbought/Oversold (RSI): ${s.rsi?.toFixed(0)||"N/A"} ${s.rsi>70?"— overbought, might pull back":s.rsi<30?"— oversold, might bounce":"— neutral range"}
  Price range position: ${s.bbUpper&&s.bbLower?(s.price>s.bbUpper?"Near TOP of range (overbought zone)":s.price<s.bbLower?"Near BOTTOM of range (oversold zone)":"In middle of normal trading range"):"N/A"}
  Support (where buyers step in): $${s.support||"N/A"} | Resistance (where sellers step in): $${s.resistance||"N/A"}
  News sentiment: ${s.sentiment} | Options pricing (IV): ${s.ivRank?.toFixed(0)||"N/A"}% ${s.ivRank>70?"— options are expensive, sell premium":s.ivRank<30?"— options are cheap, good to buy":"— normal pricing"}
  Earnings coming up: ${s.earningsDays<999?s.earningsDays+"d away — watch out":"not soon"}
  Overall signal: ${sig.label} (${sig.confidence}) — ${sig.bullPoints} bullish signals vs ${sig.bearPoints} bearish signals
  Chart data quality: ${hasRealChart?"REAL historical candles":"estimated"}`;
  }).join("\n\n");

  return callClaude(
    `You are an expert options trading coach helping someone plan their trades for the coming week. The market is closed right now.
Analyze the chart data provided and pick the single best weekly options play and single best monthly options play.
Use ALL the data: trend lines, momentum, overbought/oversold levels, price range position, support/resistance, options pricing, and news sentiment.
Write your reasoning in plain English like you're explaining to a friend — no jargon, no "MA50" or "MACD" without explaining what it means.
Be honest. If no stock has a strong setup, say so and pick the best available with a lower confidence score.
JSON only, no markdown. Schema: {
  "weekly":{"ticker":"","direction":"BULLISH|BEARISH","confidence":0-10,"reasoning":"2-3 plain English sentences — what does the chart say and why is this the best weekly play?","suggestedPlay":"specific options strategy — what to buy/sell, rough strike price guidance, expiry timeframe","keyRisk":"one plain English sentence about the biggest danger","bestEntryNote":"one sentence — when and at what price level to enter the trade"},
  "monthly":{"ticker":"","direction":"BULLISH|BEARISH","confidence":0-10,"reasoning":"2-3 plain English sentences — what does the chart say and why is this the best monthly play?","suggestedPlay":"specific options strategy — what to buy/sell, rough strike price guidance, expiry timeframe","keyRisk":"one plain English sentence about the biggest danger","bestEntryNote":"one sentence — when and at what price level to enter the trade"}
}`,
    `After hours analysis for ${new Date().toDateString()}. Market is closed.\n\nHere is the chart and sentiment data for the watchlist:\n\n${dataStr}\n\nPick the best weekly and monthly options trade for next week.`
  );
}

// ── Candle data fetcher ───────────────────────────────────────────────────────
async function fetchCandleData(ticker,range){
  try{
    const now=Math.floor(Date.now()/1000);
    const days=range==="1W"?7:range==="1M"?30:range==="3M"?90:180;
    const resolution=range==="1W"?"60":range==="1M"?"D":"D";
    const from=now-86400*days;
    const r=await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${ticker}&resolution=${resolution}&from=${from}&to=${now}&token=${FINNHUB_KEY}`);
    const d=await r.json();
    if(d.s!=="ok"||!d.c?.length) return null;
    return{opens:d.o,highs:d.h,lows:d.l,closes:d.c,times:d.t,volume:d.v};
  }catch{return null;}
}

// ── Candlestick Chart Component ───────────────────────────────────────────────
function CandlestickChart({candles,range,onRangeChange,ticker}){
  const W=340,H=160,PAD=8;
  if(!candles||!candles.closes?.length) return(
    <div style={{height:H,display:"flex",alignItems:"center",justifyContent:"center",color:C.text3,fontFamily:"'DM Mono',monospace",fontSize:11}}>
      Loading chart data…
    </div>
  );

  const{opens,highs,lows,closes,times}=candles;
  const n=closes.length;
  const minP=Math.min(...lows)*0.999;
  const maxP=Math.max(...highs)*1.001;
  const scaleY=v=>H-PAD-((v-minP)/(maxP-minP))*(H-PAD*2);
  const barW=Math.max(2,Math.floor((W-PAD*2)/n)-1);
  const barGap=Math.max(1,(W-PAD*2)/n);

  const lastClose=closes[n-1];
  const firstClose=closes[0];
  const totalChange=((lastClose-firstClose)/firstClose)*100;

  // Price labels
  const priceLabels=[minP,minP+(maxP-minP)*0.25,minP+(maxP-minP)*0.5,minP+(maxP-minP)*0.75,maxP];

  return(
    <div style={{background:C.bg3,borderRadius:12,padding:"12px 8px 8px",border:`1px solid ${C.border}`}}>
      {/* Range selector */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,paddingLeft:4,paddingRight:4}}>
        <div style={{fontSize:11,color:C.text3,fontFamily:"'DM Mono',monospace"}}>{ticker} · {range}</div>
        <div style={{display:"flex",gap:4}}>
          {["1W","1M","3M","6M"].map(r=>(
            <button key={r} onClick={()=>onRangeChange(r)} style={{padding:"3px 8px",borderRadius:6,border:range===r?`1px solid ${C.gold}`:`1px solid ${C.border}`,background:range===r?"rgba(201,168,76,0.15)":"transparent",color:range===r?C.goldLt:C.text3,fontSize:10,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{r}</button>
          ))}
        </div>
      </div>

      {/* Chart */}
      <div style={{position:"relative"}}>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
          {/* Grid lines */}
          {priceLabels.map((p,i)=>(
            <g key={i}>
              <line x1={PAD} x2={W-PAD} y1={scaleY(p)} y2={scaleY(p)} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
              <text x={W-PAD+2} y={scaleY(p)+3} fontSize="7" fill={C.text3} fontFamily="monospace">${p.toFixed(0)}</text>
            </g>
          ))}
          {/* Candles */}
          {closes.map((_,i)=>{
            const x=PAD+i*barGap;
            const bull=closes[i]>=opens[i];
            const color=bull?C.green:C.red;
            const bodyTop=scaleY(Math.max(opens[i],closes[i]));
            const bodyBot=scaleY(Math.min(opens[i],closes[i]));
            const bodyH=Math.max(1,bodyBot-bodyTop);
            return(
              <g key={i}>
                {/* Wick */}
                <line x1={x+barW/2} x2={x+barW/2} y1={scaleY(highs[i])} y2={scaleY(lows[i])} stroke={color} strokeWidth="1" opacity="0.7"/>
                {/* Body */}
                <rect x={x} y={bodyTop} width={barW} height={bodyH} fill={color} opacity="0.85" rx="0.5"/>
              </g>
            );
          })}
          {/* Current price line */}
          <line x1={PAD} x2={W-PAD} y1={scaleY(lastClose)} y2={scaleY(lastClose)} stroke={C.gold} strokeWidth="0.8" strokeDasharray="3,3" opacity="0.6"/>
        </svg>
      </div>

      {/* Summary bar */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6,paddingLeft:4,paddingRight:4}}>
        <div style={{fontSize:10,color:C.text3,fontFamily:"'DM Mono',monospace"}}>{n} candles · {new Date(times[0]*1000).toLocaleDateString("en-US",{month:"short",day:"numeric"})} → now</div>
        <div style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:totalChange>=0?C.green:C.red,fontWeight:600}}>{totalChange>=0?"+":""}{totalChange.toFixed(2)}% this period</div>
      </div>
    </div>
  );
}

function EarningsCalendar({earnings,stocks}){
  if(earnings.length===0) return(
    <div style={{padding:40,textAlign:"center"}}>
      <div style={{fontSize:32,marginBottom:12}}>📅</div>
      <div style={{fontSize:14,color:C.text2,marginBottom:6}}>No Upcoming Earnings</div>
      <div style={{fontSize:12,color:C.text3}}>No earnings in next 21 days for your watchlist</div>
    </div>
  );
  const thisWeek=earnings.filter(e=>e.daysAway<=7);
  const nextWeek=earnings.filter(e=>e.daysAway>7&&e.daysAway<=14);
  const later=earnings.filter(e=>e.daysAway>14);
  const Row=({e})=>{
    const urg=e.daysAway<=3?C.red:e.daysAway<=7?C.amber:C.green;
    const sd=stocks.find(s=>s.ticker===e.ticker);
    return(
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderBottom:`1px solid ${C.border}`}}>
        <TickerLogo ticker={e.ticker} size={40}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
            <span style={{fontSize:15,fontWeight:600,color:C.text}}>{e.ticker}</span>
            <span style={{fontSize:11,color:C.text3,display:"block",marginTop:1}}>{getCompanyName(e.ticker)}</span>
            <span style={{fontSize:12,color:urg,fontFamily:"'DM Mono',monospace",fontWeight:600}}>{e.daysAway===0?"TODAY":e.daysAway===1?"TOMORROW":`${e.daysAway}d`}</span>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:11,color:C.text3}}>{new Date(e.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
            {e.hour&&<Chip label={e.hour==="bmo"?"☀ Pre-Market":e.hour==="amc"?"🌙 After-Hours":"🕐 TBD"} color={e.hour==="bmo"?C.amber:C.blue} size={10}/>}
            {sd&&<Chip label={`IV ${sd.ivRank?.toFixed(0)}%`} color={getIVLabel(sd.ivRank).color} size={10}/>}
            {sd&&<Chip label={`${getSentEmoji(sd.sentiment)} ${sd.sentiment}`} color={getSentColor(sd.sentiment)} size={10}/>}
          </div>
          {sd?.ma50&&sd?.ma200&&<div style={{display:"flex",gap:5,marginTop:5}}>
            <MATag price={sd.price} ma={sd.ma50} label="MA50"/>
            <MATag price={sd.price} ma={sd.ma200} label="MA200"/>
          </div>}
        </div>
        <div style={{width:8,height:8,borderRadius:"50%",background:urg,flexShrink:0,boxShadow:`0 0 8px ${urg}`}}/>
      </div>
    );
  };
  const Sec=({title,items,color})=>items.length>0?(
    <div>
      <div style={{padding:"10px 16px",fontSize:10,color,fontFamily:"'DM Mono',monospace",fontWeight:500,letterSpacing:2,background:"rgba(255,255,255,0.02)",borderBottom:`1px solid ${C.border}`}}>{title}</div>
      {items.map(e=><Row key={e.ticker+e.date} e={e}/>)}
    </div>
  ):null;
  return(
    <>
      <Sec title="🔴 THIS WEEK" items={thisWeek} color={C.red}/>
      <Sec title="🟡 NEXT WEEK" items={nextWeek} color={C.amber}/>
      <Sec title="🟢 COMING UP" items={later} color={C.green}/>
    </>
  );
}

      <div style={{width:60,height:60,borderRadius:16,background:`linear-gradient(135deg,${C.gold},${C.goldLt})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 40px rgba(201,168,76,0.4)`,marginBottom:28,animation:"glow 2s infinite"}}>
        <span style={{fontSize:28,fontWeight:400,color:"#0a0f1e",fontFamily:"'DM Serif Display',serif",fontStyle:"italic"}}>L</span>
      </div>
      <div style={{fontSize:22,fontWeight:400,color:C.text,fontFamily:"'DM Serif Display',serif",marginBottom:6}}>Lucas Trade Intel</div>
      <div style={{fontSize:10,color:C.text3,letterSpacing:3,fontFamily:"'DM Mono',monospace",marginBottom:32}}>LOADING LIVE MARKET DATA</div>
      <div style={{width:"100%",maxWidth:280,background:C.bg3,borderRadius:999,height:4,marginBottom:12,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${C.gold},${C.goldLt})`,borderRadius:999,transition:"width 0.4s ease"}}/>
      </div>
      <div style={{fontSize:12,color:C.text3,fontFamily:"'DM Mono',monospace",textAlign:"center",lineHeight:1.8}}>
        {current?`Fetching ${current}`:""}<br/>{pct}%
      </div>

}

// ── Main ──────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("scanner");
  const [stocks,setStocks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [loadProg,setLoadProg]=useState({done:0,total:0,current:""});
  const [filter,setFilter]=useState("All");
  const [sortBy,setSortBy]=useState("topPicks");
  const [selected,setSelected]=useState(null);
  const [customTickers,setCustomTickers]=useState(()=>{try{return JSON.parse(localStorage.getItem("lti_custom")||"[]");}catch{return[];}});
  const [addTicker,setAddTicker]=useState("");
  const [portfolio,setPortfolio]=useState(()=>{try{return JSON.parse(localStorage.getItem("lti_portfolio")||"[]");}catch{return[];}});
  const [newPos,setNewPos]=useState({ticker:"",type:"CALL",strike:"",expiry:"",premium:"",contracts:1});
  const [ideaTicker,setIdeaTicker]=useState("");
  const [ideaDir,setIdeaDir]=useState("BULLISH");
  const [ideaReason,setIdeaReason]=useState("");
  const [ideaTime,setIdeaTime]=useState("3 weeks");
  const [analysis,setAnalysis]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [lastUpdated,setLastUpdated]=useState(null);
  const [picks,setPicks]=useState(()=>{try{return JSON.parse(localStorage.getItem("lti_picks")||"null");}catch{return null;}});
  const [picksLoading,setPicksLoading]=useState(false);
  const [eodPicks,setEodPicks]=useState(()=>{try{return JSON.parse(localStorage.getItem("lti_eod_picks")||"null");}catch{return null;}});
  const [eodLoading,setEodLoading]=useState(false);
  const [earnings,setEarnings]=useState([]);
  const [earningsLoading,setEarningsLoading]=useState(false);

  useEffect(()=>{try{localStorage.setItem("lti_custom",JSON.stringify(customTickers));}catch{}},[customTickers]);
  useEffect(()=>{try{localStorage.setItem("lti_portfolio",JSON.stringify(portfolio));}catch{}},[portfolio]);
  useEffect(()=>{if(picks)try{localStorage.setItem("lti_picks",JSON.stringify(picks));}catch{}},[picks]);
  useEffect(()=>{if(eodPicks)try{localStorage.setItem("lti_eod_picks",JSON.stringify(eodPicks));}catch{}},[eodPicks]);

  const fetchStocks=useCallback(async()=>{
    setLoading(true);
    const data=await loadAllStocks(customTickers,(done,total,current)=>setLoadProg({done,total,current}));
    setStocks(data);setLastUpdated(new Date());setLoading(false);
    setEarningsLoading(true);
    const earningsData=await fetchEarnings([...ALL_TICKERS,...customTickers]);
    setEarnings(earningsData);setEarningsLoading(false);
  },[customTickers]);

  useEffect(()=>{fetchStocks();},[]);

  const handleGenPicks=async()=>{
    if(!stocks.length) return;
    setPicksLoading(true);
    const result=await genPicks(stocks);
    if(result) setPicks(result);
    setPicksLoading(false);
  };

  const handleGenEODPicks=async()=>{
    if(!stocks.length) return;
    setEodLoading(true);
    const result=await genEODPicks(stocks);
    if(result) setEodPicks(result);
    setEodLoading(false);
  };

  const bullish=stocks.filter(s=>getSignal(s).label==="BULLISH").length;
  const bearish=stocks.filter(s=>getSignal(s).label==="BEARISH").length;
  const liveCount=stocks.filter(s=>s.live).length;

  const filtered=stocks
    .filter(s=>{
      if(filter==="All") return true;
      if(filter==="Custom") return customTickers.includes(s.ticker);
      return WATCHLIST[filter]?.includes(s.ticker);
    })
    .sort((a,b)=>{
      if(sortBy==="topPicks") return getSortScore(b)-getSortScore(a);
      if(sortBy==="bullish"){
        const sa=getSignalAndConfidence(a),sb=getSignalAndConfidence(b);
        if(sa.label==="BULLISH"&&sb.label!=="BULLISH") return -1;
        if(sb.label==="BULLISH"&&sa.label!=="BULLISH") return 1;
        return sb.confScore-sa.confScore;
      }
      if(sortBy==="bearish"){
        const sa=getSignalAndConfidence(a),sb=getSignalAndConfidence(b);
        if(sa.label==="BEARISH"&&sb.label!=="BEARISH") return -1;
        if(sb.label==="BEARISH"&&sa.label!=="BEARISH") return 1;
        return sb.confScore-sa.confScore;
      }
      if(sortBy==="change") return b.change-a.change;
      if(sortBy==="rsi") return b.rsi-a.rsi;
      if(sortBy==="iv") return b.ivRank-a.ivRank;
      return getSortScore(b)-getSortScore(a);
    });

  const handleAnalyze=async()=>{
    if(!ideaTicker||!ideaReason) return;
    setAnalyzing(true);setAnalysis(null);
    const sd=stocks.find(s=>s.ticker===ideaTicker.toUpperCase())||mockStock(ideaTicker.toUpperCase());
    const prompt=`Stock: ${ideaTicker.toUpperCase()} | Live: ${sd.live}
Thesis: ${ideaDir} over ${ideaTime}
Reasoning: ${ideaReason}
Price: $${sd.price?.toFixed(2)} | Change: ${sd.change?.toFixed(2)}% | Momentum: ${sd.momentum?.toFixed(0)}/100
RSI: ${sd.rsi?.toFixed(0)} | IV Rank: ${sd.ivRank?.toFixed(0)}%
MA50: ${sd.ma50||"N/A"} | MA200: ${sd.ma200||"N/A"} | Price vs MA50: ${sd.ma50?(sd.price>sd.ma50?"Above":"Below"):"N/A"} | Price vs MA200: ${sd.ma200?(sd.price>sd.ma200?"Above":"Below"):"N/A"}
MACD Hist: ${sd.macdHist||"N/A"} (${sd.macdHist>0?"Bullish":"Bearish"})
BB Upper: ${sd.bbUpper||"N/A"} | BB Lower: ${sd.bbLower||"N/A"}
Support: ${sd.support||"N/A"} | Resistance: ${sd.resistance||"N/A"}
Sentiment: ${sd.sentiment} | Volume Spike: ${sd.volumeSpike}
Earnings: ${sd.earningsDays<999?sd.earningsDays+"d":"unknown"}
Headlines: ${sd.newsHeadlines?.map(n=>n.headline).join(" | ")||"none"}
Analyze honestly. Disagree if data doesn't support it.`;
    const result=await analyzeIdea(prompt);
    setAnalysis(result);setAnalyzing(false);
  };

  const addPosition=()=>{
    if(!newPos.ticker||!newPos.strike||!newPos.expiry) return;
    setPortfolio(p=>[...p,{...newPos,id:Date.now(),ticker:newPos.ticker.toUpperCase()}]);
    setNewPos({ticker:"",type:"CALL",strike:"",expiry:"",premium:"",contracts:1});
  };

  if(loading) return <LoadingScreen progress={loadProg.done} total={loadProg.total} current={loadProg.current}/>;

  const NAVS=[{id:"scanner",icon:"⊞",label:"Scanner"},{id:"picks",icon:"★",label:"Picks"},{id:"earnings",icon:"◷",label:"Earnings"},{id:"validator",icon:"◎",label:"Validate"},{id:"portfolio",icon:"◉",label:"Portfolio"}];

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,maxWidth:480,margin:"0 auto",fontFamily:"'DM Sans',sans-serif"}}>
      {selected&&<StockDetail data={selected} onClose={()=>setSelected(null)}/>}

      {/* Header */}
      <div style={{padding:"14px 16px 12px",borderBottom:`1px solid ${C.border}`,background:C.bg,position:"sticky",top:0,zIndex:50,backdropFilter:"blur(20px)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <Logo/>
          <button onClick={fetchStocks} style={{...ghostBtn,padding:"7px 12px",fontSize:12,display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:14}}>⟳</span> Refresh
          </button>
        </div>
        <div style={{display:"flex",gap:8}}>
          {[["▲",bullish,C.green],["▼",bearish,C.red],["◆",stocks.length-bullish-bearish,C.text3],["●",`${liveCount}/${stocks.length}`,C.gold]].map(([emoji,val,color],i)=>(
            <div key={i} style={{flex:1,background:C.bg2,borderRadius:10,padding:"8px 6px",textAlign:"center",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:10,color,fontFamily:"'DM Mono',monospace",marginBottom:2}}>{emoji}</div>
              <div style={{fontSize:13,fontWeight:600,color,fontFamily:"'DM Mono',monospace"}}>{val}</div>
            </div>
          ))}
        </div>
        {lastUpdated&&<div style={{fontSize:10,color:C.text3,fontFamily:"'DM Mono',monospace",marginTop:6}}><LiveDot live={true}/>{lastUpdated.toLocaleTimeString()} · {liveCount} live feeds active</div>}
      </div>

      {/* Nav */}
      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.bg,position:"sticky",top:116,zIndex:49,overflowX:"auto"}}>
        {NAVS.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{flexShrink:0,flex:1,padding:"12px 8px",border:"none",cursor:"pointer",background:"transparent",borderBottom:tab===n.id?`2px solid ${C.gold}`:"2px solid transparent",color:tab===n.id?C.goldLt:C.text2,fontSize:12,fontFamily:"'DM Sans',sans-serif",fontWeight:tab===n.id?600:400,transition:"all 0.15s",letterSpacing:0.3}}>
            <div style={{fontSize:14,marginBottom:2}}>{n.icon}</div>
            {n.label}
          </button>
        ))}
      </div>

      <div style={{padding:16}}>

        {/* ── SCANNER ── */}
        {tab==="scanner"&&(<>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:12}}>
            {["All","AI & Tech","AI Software","Quantum","Photonics","LEO & Space","Robotics","Nuclear","Energy","EV & Battery","Commodities","Macro & ETFs","Minerals & Mining","Custom"].map(f=>(
              <button key={f} style={fBtn(filter===f)} onClick={()=>setFilter(f)}>{f}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:6,marginBottom:14,alignItems:"center",overflowX:"auto"}}>
            <span style={{fontSize:11,color:C.text3,flexShrink:0,fontFamily:"'DM Mono',monospace"}}>Sort:</span>
            {[["topPicks","⭐ Top Picks"],["bullish","▲ Bullish"],["bearish","▼ Bearish"],["change","% Chg"],["rsi","RSI"],["iv","IV"]].map(([k,l])=>(
              <button key={k} style={fBtn(sortBy===k)} onClick={()=>setSortBy(k)}>{l}</button>
            ))}
          </div>

          {/* Bullish */}
          <div style={{...card}}>
            <div style={{...cardHdr,color:C.green}}><span>▲</span> Top Bullish Setups</div>
            {filtered.filter(s=>getSignal(s).label==="BULLISH").slice(0,5).map(s=><StockRow key={s.ticker} data={s} onClick={setSelected}/>)}
            {!filtered.some(s=>getSignal(s).label==="BULLISH")&&<div style={{padding:16,color:C.text3,fontSize:13}}>No bullish setups in this filter</div>}
          </div>

          {/* Bearish */}
          <div style={card}>
            <div style={{...cardHdr,color:C.red}}><span>▼</span> Top Bearish Setups</div>
            {filtered.filter(s=>getSignal(s).label==="BEARISH").slice(0,5).map(s=><StockRow key={s.ticker} data={s} onClick={setSelected}/>)}
            {!filtered.some(s=>getSignal(s).label==="BEARISH")&&<div style={{padding:16,color:C.text3,fontSize:13}}>No bearish setups in this filter</div>}
          </div>

          {/* Full list */}
          <div style={card}>
            <div style={cardHdr}><span>⊞</span> Full Watchlist <span style={{marginLeft:"auto",color:C.text3,fontSize:10,fontFamily:"'DM Mono',monospace"}}>{filtered.length} stocks</span></div>
            {filtered.map(s=><StockRow key={s.ticker} data={s} onClick={setSelected}/>)}
          </div>

          {/* Add ticker */}
          <div style={card}>
            <div style={cardHdr}>+ Add Ticker</div>
            <div style={{padding:14,display:"flex",gap:8}}>
              <input style={{...inp,flex:1}} placeholder="e.g. COIN" value={addTicker} onChange={e=>setAddTicker(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&(()=>{const t=addTicker.trim();if(t&&!customTickers.includes(t)&&!ALL_TICKERS.includes(t)){setCustomTickers(p=>[...p,t]);setAddTicker("");}})()}/>
              <button style={{...ghostBtn}} onClick={()=>{const t=addTicker.trim();if(t&&!customTickers.includes(t)&&!ALL_TICKERS.includes(t)){setCustomTickers(p=>[...p,t]);setAddTicker("");}}}>Add</button>
            </div>
            {customTickers.length>0&&(
              <div style={{padding:"0 14px 14px",display:"flex",flexWrap:"wrap",gap:6}}>
                {customTickers.map(t=>(
                  <span key={t} style={{background:"rgba(201,168,76,0.1)",border:`1px solid ${C.gold}30`,borderRadius:8,padding:"4px 10px",fontSize:12,color:C.goldLt,display:"flex",alignItems:"center",gap:6}}>
                    {t}
                    <span onClick={()=>setCustomTickers(p=>p.filter(x=>x!==t))} style={{cursor:"pointer",color:C.red,fontSize:14,lineHeight:1}}>×</span>
                  </span>
                ))}
              </div>
            )}
          </div>
        </>)}

        {/* ── PICKS ── */}
        {tab==="picks"&&(<>
          <div style={{background:"rgba(201,168,76,0.06)",border:`1px solid ${C.gold}20`,borderRadius:12,padding:14,marginBottom:14,fontSize:13,color:C.text2,lineHeight:1.7}}>
            🏆 AI picks using live price, RSI, MA trend, MACD, Bollinger Bands, support/resistance, IV rank, and sentiment. Regenerate every Sunday for weekly picks and monthly for the monthly pick.
          </div>

          {/* Live Picks */}
          <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:14,padding:14,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{fontSize:16}}>📈</span>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.text}}>Live Market Picks</div>
                <div style={{fontSize:11,color:C.text3}}>Best used during market hours (9:30am–4pm ET) when live prices are active</div>
              </div>
            </div>
            <button onClick={handleGenPicks} disabled={picksLoading||eodLoading} style={{...goldBtn,marginTop:8,marginBottom:0}}>
              {picksLoading?"Analyzing live data…":"⟳ Generate Live Picks"}
            </button>
          </div>
          {picksLoading&&<div style={{textAlign:"center",padding:32,color:C.gold,fontFamily:"'DM Mono',monospace",fontSize:12,letterSpacing:1}}>
            <div style={{fontSize:24,marginBottom:10,display:"inline-block",animation:"spin 1s linear infinite"}}>◌</div>
            <div>Analyzing live market data…</div>
          </div>}
          {picks&&!picksLoading&&<>
            <PickCard pick={picks.weekly} timeframe="PICK OF THE WEEK — LIVE" stocks={stocks}/>
            <PickCard pick={picks.monthly} timeframe="PICK OF THE MONTH — LIVE" stocks={stocks}/>
          </>}

          {/* Divider */}
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"8px 0 14px"}}>
            <div style={{flex:1,height:1,background:C.border}}/>
            <span style={{fontSize:11,color:C.text3,fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap"}}>OR</span>
            <div style={{flex:1,height:1,background:C.border}}/>
          </div>

          {/* EOD Picks */}
          <div style={{background:"rgba(59,130,246,0.06)",border:`1px solid rgba(59,130,246,0.2)`,borderRadius:14,padding:14,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{fontSize:16}}>🌙</span>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.text}}>After Hours Analysis</div>
                <div style={{fontSize:11,color:C.text3}}>Fetches real chart history + news sentiment — works anytime, even when market is closed</div>
              </div>
            </div>
            <button onClick={handleGenEODPicks} disabled={eodLoading||picksLoading} style={{...goldBtn,marginTop:8,marginBottom:0,background:"linear-gradient(135deg,#3b82f6,#60a5fa,#3b82f6)",boxShadow:"0 4px 20px rgba(59,130,246,0.3)"}}>
              {eodLoading?"Fetching charts & news…":"🌙 After Hours Analysis"}
            </button>
          </div>
          {eodLoading&&<div style={{textAlign:"center",padding:32,color:"#60a5fa",fontFamily:"'DM Mono',monospace",fontSize:12,letterSpacing:1}}>
            <div style={{fontSize:24,marginBottom:10,display:"inline-block",animation:"spin 1s linear infinite"}}>◌</div>
            <div style={{marginBottom:6}}>Scanning 30 stocks across all sectors…</div>
            <div style={{fontSize:10,color:C.text3}}>AI chips · Quantum · Nuclear · Space · Commodities · Macro</div>
            <div style={{fontSize:10,color:C.text3,marginTop:4}}>This takes 30–60 seconds. Fetching real chart data for each.</div>
          </div>}
          {eodPicks&&!eodLoading&&<>
            <EodPickCard pick={eodPicks.weekly} timeframe="AFTER HOURS PICK — WEEKLY"/>
            <EodPickCard pick={eodPicks.monthly} timeframe="AFTER HOURS PICK — MONTHLY"/>
          </>}

          {!picks&&!picksLoading&&!eodPicks&&!eodLoading&&<div style={{textAlign:"center",padding:36,color:C.text3}}>
            <div style={{fontSize:36,marginBottom:12}}>🏆</div>
            <div style={{fontSize:15,marginBottom:6,color:C.text2}}>No picks yet</div>
            <div style={{fontSize:13,lineHeight:1.7}}>During market hours use <strong style={{color:C.gold}}>Live Picks</strong>.<br/>After hours use <strong style={{color:C.blue}}>After Hours Analysis</strong>.</div>
          </div>}
        </>)}

        {/* ── EARNINGS ── */}
        {tab==="earnings"&&(<>
          <div style={{background:"rgba(245,158,11,0.06)",border:`1px solid ${C.amber}20`,borderRadius:12,padding:14,marginBottom:14,fontSize:13,color:C.text2,lineHeight:1.7}}>
            📅 Upcoming earnings for your watchlist. Options premiums spike before earnings — plan ahead.
          </div>
          {earningsLoading?<div style={{textAlign:"center",padding:40,color:C.gold,fontFamily:"'DM Mono',monospace",fontSize:12}}>
            <div style={{fontSize:22,display:"inline-block",animation:"spin 1s linear infinite",marginBottom:10}}>◌</div>
            <div>Loading earnings calendar…</div>
          </div>:<div style={card}><EarningsCalendar earnings={earnings} stocks={stocks}/></div>}
          <div style={{background:C.bg2,borderRadius:12,padding:14,border:`1px solid ${C.border}`,marginTop:4}}>
            <div style={{fontSize:11,color:C.gold,fontFamily:"'DM Mono',monospace",marginBottom:8,letterSpacing:1}}>LEGEND</div>
            <div style={{fontSize:12,color:C.text2,lineHeight:2}}>
              ☀ Pre-Market (BMO) &nbsp;·&nbsp; 🌙 After-Hours (AMC)<br/>
              🔴 1–3 days = Act now or stay out<br/>
              🟡 4–7 days = Plan your play<br/>
              🟢 8–21 days = Plenty of time
            </div>
          </div>
        </>)}

        {/* ── VALIDATOR ── */}
        {tab==="validator"&&(<>
          <div style={{background:"rgba(201,168,76,0.06)",border:`1px solid ${C.gold}20`,borderRadius:12,padding:14,marginBottom:14,fontSize:13,color:C.text2,lineHeight:1.7}}>
            📌 Enter your trade idea. I'll analyze it with live price, RSI, MA trend, MACD, Bollinger Bands, support/resistance, sentiment, and news — and tell you honestly if the data supports it.
          </div>
          <div style={card}>
            <div style={cardHdr}>◎ Validate Your Trade Idea</div>
            <div style={{padding:16,display:"flex",flexDirection:"column",gap:14}}>
              <div><label style={lbl}>TICKER</label><input style={inp} placeholder="e.g. NVDA" value={ideaTicker} onChange={e=>setIdeaTicker(e.target.value.toUpperCase())}/></div>
              <div>
                <label style={lbl}>DIRECTION</label>
                <div style={{display:"flex",gap:8}}>
                  {["BULLISH","BEARISH"].map(d=>(
                    <button key={d} onClick={()=>setIdeaDir(d)} style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid`,borderColor:ideaDir===d?(d==="BULLISH"?C.green:C.red):C.border,background:ideaDir===d?(d==="BULLISH"?"rgba(0,200,150,0.1)":"rgba(240,70,90,0.1)"):"transparent",color:ideaDir===d?(d==="BULLISH"?C.green:C.red):C.text2,fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.15s"}}>
                      {d==="BULLISH"?"▲ Bullish":"▼ Bearish"}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label style={lbl}>TIMEFRAME</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {["1 week","2 weeks","3 weeks","1 month","2 months"].map(t=>(
                    <button key={t} style={fBtn(ideaTime===t)} onClick={()=>setIdeaTime(t)}>{t}</button>
                  ))}
                </div>
              </div>
              <div><label style={lbl}>YOUR REASONING</label><textarea style={{...inp,minHeight:90,lineHeight:1.6}} placeholder="Why do you think this stock is going up or down? Be specific…" value={ideaReason} onChange={e=>setIdeaReason(e.target.value)}/></div>
              <button style={goldBtn} onClick={handleAnalyze} disabled={analyzing}>{analyzing?"Analyzing…":"◎ Analyze My Idea"}</button>
            </div>
          </div>
          {analyzing&&<div style={{textAlign:"center",padding:32,color:C.gold,fontFamily:"'DM Mono',monospace",fontSize:12,letterSpacing:1}}>
            <div style={{fontSize:24,display:"inline-block",animation:"spin 1s linear infinite",marginBottom:10}}>◌</div>
            <div>Running full technical analysis…</div>
          </div>}
          {analysis&&(
            <div style={{...card,border:`1px solid ${analysis.agree?C.green:C.red}30`,animation:"fadeUp 0.3s ease"}}>
              <div style={{...cardHdr,color:analysis.agree?C.green:C.red}}>{analysis.agree?"✓ Analysis Agrees":"✗ Analysis Disagrees"}</div>
              <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[["VERDICT",analysis.verdict,analysis.verdict==="BULLISH"?C.green:analysis.verdict==="BEARISH"?C.red:C.text2],["CONFIDENCE",`${analysis.confidence}/10`,analysis.confidence>=7?C.green:analysis.confidence>=5?C.amber:C.red]].map(([l,v,c])=>(
                    <div key={l} style={{background:C.bg3,borderRadius:10,padding:12,textAlign:"center"}}>
                      <div style={{fontSize:10,color:C.text3,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:4}}>{l}</div>
                      <div style={{fontSize:16,fontWeight:600,color:c,fontFamily:"'DM Serif Display',serif"}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:13,color:C.text2,lineHeight:1.7}}>{analysis.reasoning}</div>
                <div style={{background:C.bg3,border:`1px solid ${C.gold}20`,borderRadius:10,padding:12}}>
                  <div style={{fontSize:10,color:C.gold,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:5}}>SUGGESTED PLAY</div>
                  <div style={{fontSize:13,color:C.text,fontWeight:500}}>{analysis.suggestedPlay}</div>
                </div>
                <div style={{background:"rgba(240,70,90,0.06)",border:`1px solid ${C.red}20`,borderRadius:10,padding:12}}>
                  <div style={{fontSize:10,color:C.red,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:5}}>⚠ KEY RISK</div>
                  <div style={{fontSize:12,color:C.text2,lineHeight:1.5}}>{analysis.keyRisk}</div>
                </div>
              </div>
            </div>
          )}
        </>)}

        {/* ── PORTFOLIO ── */}
        {tab==="portfolio"&&(<>
          <div style={card}>
            <div style={cardHdr}>+ Log New Position</div>
            <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label style={lbl}>TICKER</label><input style={inp} placeholder="NVDA" value={newPos.ticker} onChange={e=>setNewPos(p=>({...p,ticker:e.target.value.toUpperCase()}))}/></div>
                <div>
                  <label style={lbl}>TYPE</label>
                  <div style={{display:"flex",gap:6}}>
                    {["CALL","PUT"].map(t=>(
                      <button key={t} onClick={()=>setNewPos(p=>({...p,type:t}))} style={{flex:1,padding:"11px 4px",borderRadius:10,border:`1px solid`,borderColor:newPos.type===t?(t==="CALL"?C.green:C.red):C.border,background:newPos.type===t?(t==="CALL"?"rgba(0,200,150,0.1)":"rgba(240,70,90,0.1)"):"transparent",color:newPos.type===t?(t==="CALL"?C.green:C.red):C.text2,fontFamily:"'DM Sans',sans-serif",fontSize:13,fontWeight:600,cursor:"pointer"}}>{t}</button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label style={lbl}>STRIKE</label><input style={inp} placeholder="$210" value={newPos.strike} onChange={e=>setNewPos(p=>({...p,strike:e.target.value}))}/></div>
                <div><label style={lbl}>EXPIRY</label><input style={inp} placeholder="05/16/25" value={newPos.expiry} onChange={e=>setNewPos(p=>({...p,expiry:e.target.value}))}/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><label style={lbl}>PREMIUM PAID</label><input style={inp} placeholder="$3.20" value={newPos.premium} onChange={e=>setNewPos(p=>({...p,premium:e.target.value}))}/></div>
                <div><label style={lbl}>CONTRACTS</label><input style={inp} type="number" min="1" value={newPos.contracts} onChange={e=>setNewPos(p=>({...p,contracts:e.target.value}))}/></div>
              </div>
              <button style={goldBtn} onClick={addPosition}>+ Add Position</button>
            </div>
          </div>
          {portfolio.length===0?(
            <div style={{textAlign:"center",padding:48,color:C.text3}}>
              <div style={{fontSize:36,marginBottom:12}}>◉</div>
              <div style={{fontSize:15,color:C.text2,marginBottom:6}}>No Open Positions</div>
              <div style={{fontSize:13}}>Log your first trade above</div>
            </div>
          ):(
            <div style={card}>
              <div style={cardHdr}>◉ Open Positions <span style={{marginLeft:"auto",color:C.text3,fontSize:10,fontFamily:"'DM Mono',monospace"}}>{portfolio.length} active</span></div>
              {portfolio.map(pos=>{
                const sd=stocks.find(s=>s.ticker===pos.ticker)||mockStock(pos.ticker);
                const sig=getSignal(sd);
                const aligned=(pos.type==="CALL"&&sig.label==="BULLISH")||(pos.type==="PUT"&&sig.label==="BEARISH");
                const expDate=pos.expiry?new Date(pos.expiry+"T00:00:00"):null;
                const daysLeft=expDate?Math.round((expDate-new Date())/86400000):null;
                return(
                  <div key={pos.id} style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                      <TickerLogo ticker={pos.ticker} size={38}/>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                          <div style={{display:"flex",gap:8,alignItems:"center"}}>
                            <span style={{fontSize:16,fontWeight:600,color:C.text}}>{pos.ticker}</span>
                            <span style={{fontSize:11,color:C.text3,display:"block",marginTop:1}}>{getCompanyName(pos.ticker)}</span>
                            <Chip label={pos.type} color={pos.type==="CALL"?C.green:C.red} size={11}/>
                            <LiveDot live={sd.live}/>
                          </div>
                          <button onClick={()=>setPortfolio(p=>p.filter(x=>x.id!==pos.id))} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
                        </div>
                        {daysLeft!==null&&<div style={{fontSize:11,color:daysLeft<7?C.red:daysLeft<14?C.amber:C.text3,fontFamily:"'DM Mono',monospace"}}>{daysLeft>0?`${daysLeft} days to expiry`:"Expired"}</div>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:12,fontSize:12,color:C.text2,flexWrap:"wrap",marginBottom:10}}>
                      {[["Strike",pos.strike],["Expiry",pos.expiry],["Premium",pos.premium],["Contracts",pos.contracts]].map(([l,v])=>(
                        <span key={l}>{l}: <span style={{color:C.text,fontWeight:500}}>{v}</span></span>
                      ))}
                    </div>
                    {sd.live&&<div style={{fontSize:12,color:C.text2,marginBottom:8}}>
                      Live: <span style={{color:C.text,fontWeight:500}}>${sd.price?.toFixed(2)}</span>{" "}
                      <span style={{color:sd.change>=0?C.green:C.red}}>{sd.change>=0?"+":""}{sd.change?.toFixed(2)}%</span>
                      {" · "}<Chip label={`${getSentEmoji(sd.sentiment)} ${sd.sentiment}`} color={getSentColor(sd.sentiment)} size={10}/>
                    </div>}
                    {(sd.ma50||sd.ma200)&&<div style={{display:"flex",gap:5,marginBottom:8}}>
                      <MATag price={sd.price} ma={sd.ma50} label="MA50"/>
                      <MATag price={sd.price} ma={sd.ma200} label="MA200"/>
                    </div>}
                    <div style={{padding:"8px 12px",borderRadius:8,background:aligned?"rgba(0,200,150,0.08)":"rgba(245,158,11,0.08)",border:`1px solid ${aligned?C.green:C.amber}25`,fontSize:12,color:aligned?C.green:C.amber}}>
                      {aligned?"✓ Signal aligned with your position":"⚠ Current signal doesn't favor this position — monitor closely"}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>)}
      </div>

      <div style={{padding:"20px 16px",borderTop:`1px solid ${C.border}`,textAlign:"center"}}>
        <div style={{fontSize:10,color:C.text3,fontFamily:"'DM Mono',monospace",lineHeight:2,letterSpacing:0.5}}>
          Lucas Trade Intel · For informational purposes only<br/>
          Not financial advice · Options trading involves substantial risk<br/>
          © Lucas Heating LLC
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
