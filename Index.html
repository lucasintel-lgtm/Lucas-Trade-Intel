// Fetch real-time quote from Tradier
async function fetchTradierQuote(ticker){
  try{
    const r=await fetch(`${TRADIER_BASE}/markets/quotes?symbols=${ticker}&greeks=false`,{
      headers:{"Authorization":`Bearer ${TRADIER_KEY}`,"Accept":"application/json"}
    });
    const d=await r.json();
    const q=d?.quotes?.quote;
    if(!q||q.last===null) return null;
    return{
      price:q.last||q.close,
      change:q.change_percentage||0,
      open:q.open,high:q.high,low:q.low,prevClose:q.prevclose,
      volume:q.volume,avgVolume:q.average_volume,
      week52High:q.week_52_high,week52Low:q.week_52_low,
      bidPrice:q.bid,askPrice:q.ask
    };
  }catch{return null;}
}

// Fetch real options chain from Tradier
async function fetchTradierOptions(ticker){
  try{
    // Get available expirations first
    const expR=await fetch(`${TRADIER_BASE}/markets/options/expirations?symbol=${ticker}&includeAllRoots=true`,{
      headers:{"Authorization":`Bearer ${TRADIER_KEY}`,"Accept":"application/json"}
    });
    const expD=await expR.json();
    const expirations=expD?.expirations?.date;
    if(!expirations||!expirations.length) return null;

    // Find best expirations: one weekly (7-14 DTE) and one monthly (21-45 DTE)
    const now=new Date();
    const addDays=(d,n)=>new Date(d.getTime()+n*86400000);
    const weekly=expirations.find(e=>{
      const d=new Date(e);
      const dte=Math.round((d-now)/86400000);
      return dte>=7&&dte<=16;
    });
    const monthly=expirations.find(e=>{
      const d=new Date(e);
      const dte=Math.round((d-now)/86400000);
      return dte>=21&&dte<=50;
    });

    const fetchChain=async(expiry)=>{
      if(!expiry) return null;
      const r=await fetch(`${TRADIER_BASE}/markets/options/chains?symbol=${ticker}&expiration=${expiry}&greeks=true`,{
        headers:{"Authorization":`Bearer ${TRADIER_KEY}`,"Accept":"application/json"}
      });
      const d=await r.json();
      return d?.options?.option||null;
    };

    const [weeklyChain,monthlyChain]=await Promise.all([
      fetchChain(weekly),fetchChain(monthly)
    ]);

    return{
      weeklyExpiry:weekly,monthlyExpiry:monthly,
      weeklyChain,monthlyChain
    };
  }catch{return null;}
}

// Get IV rank from Tradier options data
function calcIVRankFromChain(chain){
  if(!chain||!chain.length) return null;
  const ivs=chain.filter(o=>o.greeks?.mid_iv>0).map(o=>o.greeks.mid_iv*100);
  if(!ivs.length) return null;
  const avgIV=ivs.reduce((a,b)=>a+b,0)/ivs.length;
  // Estimate IV rank — compare current IV to a reasonable range
  const minIV=Math.min(...ivs);
  const maxIV=Math.max(...ivs);
  return maxIV>minIV?Math.round(((avgIV-minIV)/(maxIV-minIV))*100):50;
}

// Find best spread legs for a debit spread
function findBestSpread(chain,direction,currentPrice){
  if(!chain||!chain.length) return null;
  const type=direction==="BULLISH"?"call":"put";
  const contracts=chain.filter(o=>
    o.option_type===type&&
    o.greeks?.delta!=null&&
    o.bid>0&&o.ask>0&&
    (o.ask-o.bid)<2 // reasonable bid/ask spread
  );
  if(contracts.length<2) return null;

  // Long leg: delta 0.45-0.60
  const longLeg=contracts.find(o=>{
    const d=Math.abs(o.greeks.delta);
    return d>=0.40&&d<=0.65;
  });
  if(!longLeg) return null;

  // Short leg: delta 0.25-0.35, different strike
  const shortLeg=contracts.find(o=>{
    const d=Math.abs(o.greeks.delta);
    const diffStrike=direction==="BULLISH"?o.strike>longLeg.strike:o.strike<longLeg.strike;
    return d>=0.20&&d<=0.38&&diffStrike;
  });
  if(!shortLeg) return null;

  const debit=parseFloat((longLeg.ask-shortLeg.bid).toFixed(2));
  const spreadWidth=Math.abs(longLeg.strike-shortLeg.strike);
  const maxGain=parseFloat((spreadWidth-debit).toFixed(2));
  const riskReward=maxGain>0?parseFloat((maxGain/debit).toFixed(2)):0;
  const bidAskWidth=parseFloat((longLeg.ask-longLeg.bid).toFixed(2));

  return{
    longStrike:longLeg.strike,longDelta:longLeg.greeks.delta?.toFixed(2),
    longBid:longLeg.bid,longAsk:longLeg.ask,longOI:longLeg.open_interest,
    shortStrike:shortLeg.strike,shortDelta:shortLeg.greeks.delta?.toFixed(2),
    shortBid:shortLeg.bid,shortAsk:shortLeg.ask,shortOI:shortLeg.open_interest,
    debit,maxGain,spreadWidth,riskReward,bidAskWidth,
    theta:longLeg.greeks.theta?.toFixed(3),
    gamma:longLeg.greeks.gamma?.toFixed(3),
    liquidityGood:bidAskWidth<0.50&&longLeg.open_interest>100,
    riskRewardGood:riskReward>=1.0
  };
}

// Full Tradier data fetch for one ticker
async function fetchTradierFull(ticker){
  try{
    const [quote,options]=await Promise.all([
      fetchTradierQuote(ticker),
      fetchTradierOptions(ticker)
    ]);
    if(!quote) return null;

    // Get IV rank from options chain
    const allContracts=[
      ...(options?.weeklyChain||[]),
      ...(options?.monthlyChain||[])
    ];
    const ivRank=calcIVRankFromChain(allContracts);

    // Find best spreads
    const weeklyCallSpread=options?.weeklyChain?findBestSpread(options.weeklyChain,"BULLISH",quote.price):null;
    const weeklyPutSpread=options?.weeklyChain?findBestSpread(options.weeklyChain,"BEARISH",quote.price):null;
    const monthlyCallSpread=options?.monthlyChain?findBestSpread(options.monthlyChain,"BULLISH",quote.price):null;
    const monthlyPutSpread=options?.monthlyChain?findBestSpread(options.monthlyChain,"BEARISH",quote.price):null;

    return{
      ...quote,
      ivRank,
      tradierLive:true,
      weeklyExpiry:options?.weeklyExpiry,
      monthlyExpiry:options?.monthlyExpiry,
      weeklyCallSpread,weeklyPutSpread,
      monthlyCallSpread,monthlyPutSpread,
      hasRealOptions:!!(weeklyCallSpread||monthlyCallSpread)
    };
  }catch{return null;}
}

// ── Math helpers ──────────────────────────────────────────────────────────────
function calcEMA(arr,period){
  if(!arr||arr.length<period) return null;
  const k=2/(period+1);
  let ema=arr.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<arr.length;i++) ema=arr[i]*k+ema*(1-k);
  return ema;
}
function calcRSI(closes,period=14){
  if(!closes||closes.length<period+1) return 50;
  let g=0,l=0;
  for(let i=closes.length-period;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    if(d>0)g+=d;else l+=Math.abs(d);
  }
  const ag=g/period,al=l/period;
  return al===0?100:Math.round(100-(100/(1+ag/al)));
}
function calcMACD(closes){
  if(!closes||closes.length<26) return{hist:null};
  const e12=calcEMA(closes,12),e26=calcEMA(closes,26);
  if(!e12||!e26) return{hist:null};
  const macd=e12-e26,signal=macd*0.9;
  return{macd:parseFloat(macd.toFixed(3)),signal:parseFloat(signal.toFixed(3)),hist:parseFloat((macd-signal).toFixed(3))};
}
function calcBB(closes,p=20){
  if(!closes||closes.length<p) return{upper:null,lower:null,mid:null};
  const sl=closes.slice(-p),mid=sl.reduce((a,b)=>a+b,0)/p;
  const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mid)**2,0)/p);
  return{upper:parseFloat((mid+2*std).toFixed(2)),lower:parseFloat((mid-2*std).toFixed(2)),mid:parseFloat(mid.toFixed(2))};
}

// ── Core scoring engine ───────────────────────────────────────────────────────
function scoreStock(d,spySignal,qqqSignal){
  // Returns a 0-100 options trade score with direction and recommendation
  let score=0;
  const reasons=[];
  const warnings=[];
  let direction="NEUTRAL";
  let bullPoints=0,bearPoints=0;

  // 1. TREND STRENGTH (25 pts) — price vs EMA20 and EMA50
  const ema20=d.ema20,ema50=d.ema50;
  if(ema20&&ema50&&d.price){
    if(d.price>ema20&&d.price>ema50&&ema20>ema50){bullPoints+=3;score+=25;reasons.push("Price above both trend lines — strong uptrend");}
    else if(d.price>ema20&&d.price>ema50){bullPoints+=2;score+=18;reasons.push("Price above both trend lines");}
    else if(d.price>ema20&&d.price<ema50){bullPoints+=1;bearPoints+=1;score+=10;reasons.push("Short-term uptrend but below long-term average");}
    else if(d.price<ema20&&d.price<ema50&&ema20<ema50){bearPoints+=3;score+=25;reasons.push("Price below both trend lines — strong downtrend");}
    else if(d.price<ema20&&d.price<ema50){bearPoints+=2;score+=18;reasons.push("Price below both trend lines");}
    else{score+=8;}
  }

  // 2. MOMENTUM (20 pts) — MACD and daily change
  if(d.macdHist!=null){
    if(d.macdHist>0){bullPoints+=2;score+=15;reasons.push("Momentum is building upward");}
    else{bearPoints+=2;score+=15;reasons.push("Momentum is fading downward");}
  }
  // Penalize huge same-day moves (chasing risk)
  const absChange=Math.abs(d.change||0);
  if(absChange>8){score-=10;warnings.push(`Already moved ${d.change?.toFixed(1)}% today — avoid chasing this move`);}
  else if(absChange>5){score-=5;warnings.push(`Large move today (${d.change?.toFixed(1)}%) — wait for consolidation before entering`);}
  else if(absChange<3&&absChange>0){score+=5;}

  // 3. RSI — overextension (15 pts)
  const rsi=d.rsi||50;
  if(bullPoints>=bearPoints){
    // Bullish bias — ideal RSI 45-65
    if(rsi>=45&&rsi<=65){score+=15;reasons.push("RSI in ideal zone for bullish entry (not overbought)");}
    else if(rsi>65&&rsi<=70){score+=8;warnings.push("RSI getting high — stock may be slightly stretched");}
    else if(rsi>70){score+=0;warnings.push("RSI above 70 — overbought, avoid chasing, wait for pullback");}
    else if(rsi<45&&rsi>=35){score+=10;reasons.push("RSI pulling back — could be a good dip entry");}
    else{score+=5;warnings.push("RSI very low — may be oversold, confirm before going bullish");}
  } else {
    // Bearish bias — ideal RSI 35-55
    if(rsi>=35&&rsi<=55){score+=15;reasons.push("RSI in ideal zone for bearish entry (not oversold)");}
    else if(rsi<35&&rsi>=30){score+=8;warnings.push("RSI getting low — stock may be slightly oversold");}
    else if(rsi<30){score+=0;warnings.push("RSI below 30 — oversold, avoid chasing down, wait for bounce");}
    else if(rsi>55&&rsi<=65){score+=10;reasons.push("RSI elevated — may be rolling over, good for bearish plays");}
    else{score+=5;}
  }

  // 4. IV RANK — options pricing (15 pts)
  const iv=d.ivRank||50;
  if(iv<30){score+=15;reasons.push("Options are cheap right now — good time to buy a spread");}
  else if(iv<50){score+=12;reasons.push("Options pricing is normal — debit spreads are fairly priced");}
  else if(iv<70){score+=6;warnings.push(`IV rank at ${iv.toFixed(0)}% — options getting expensive, use spreads not naked options`);}
  else{score+=0;warnings.push(`IV rank at ${iv.toFixed(0)}% — options very expensive, debit spreads lose value quickly, consider waiting`);}

  // 5. MARKET CONFIRMATION (10 pts)
  const bullBias=bullPoints>bearPoints;
  const bearBias=bearPoints>bullPoints;
  if(bullBias&&spySignal==="bull"&&qqqSignal==="bull"){score+=10;reasons.push("Market (SPY + QQQ) confirms bullish direction");}
  else if(bearBias&&spySignal==="bear"&&qqqSignal==="bear"){score+=10;reasons.push("Market (SPY + QQQ) confirms bearish direction");}
  else if(bullBias&&(spySignal==="bull"||qqqSignal==="bull")){score+=6;reasons.push("Market partially supports bullish direction");}
  else if(bearBias&&(spySignal==="bear"||qqqSignal==="bear")){score+=6;reasons.push("Market partially supports bearish direction");}
  else{score+=2;warnings.push("Market direction disagrees with this setup — lower confidence");}

  // 6. EARNINGS RISK — auto skip
  const earnDays=d.earningsDays||999;
  if(earnDays<7){warnings.push(`⚠ EARNINGS IN ${earnDays} DAYS — extremely high risk, avoid unless this is an earnings play`);score-=20;}
  else if(earnDays<21){warnings.push(`Earnings in ${earnDays} days — use shorter expiration or wait until after earnings`);}
  else if(earnDays<45){warnings.push(`Earnings in ${earnDays} days — factor this into expiration choice`);}

  // 7. SUPPORT/RESISTANCE context
  if(d.support&&d.resistance&&d.price){
    const distFromSupport=((d.price-d.support)/d.price)*100;
    const distFromResistance=((d.resistance-d.price)/d.price)*100;
    if(bullPoints>=bearPoints){
      if(distFromSupport<3){score+=5;reasons.push("Price near support — good risk/reward for bullish entry");}
      if(distFromResistance<3){score-=5;warnings.push("Price near resistance — limited upside room, not ideal for calls");}
    } else {
      if(distFromResistance<3){score+=5;reasons.push("Price near resistance — good risk/reward for bearish entry");}
      if(distFromSupport<3){score-=5;warnings.push("Price near support — limited downside room, not ideal for puts");}
    }
  }

  // Final direction
  if(bullPoints>bearPoints+1) direction="BULLISH";
  else if(bearPoints>bullPoints+1) direction="BEARISH";
  else direction="NEUTRAL";

  // Final score cap
  score=Math.min(100,Math.max(0,Math.round(score)));

  // Decision logic
  let decision,strategy,expiration,confidence;
  if(earnDays<7){decision="SKIP";strategy="No Trade";expiration="N/A";confidence="Low";}
  else if(score>=70&&direction!=="NEUTRAL"){
    decision="TRADE";
    strategy=direction==="BULLISH"?"Call Debit Spread":"Put Debit Spread";
    expiration=absChange>5?"21–45 DTE":score>=85?"7–14 DTE":"21–45 DTE";
    confidence=score>=85?"High":"Medium";
  } else if(score>=45&&direction!=="NEUTRAL"){
    decision="WAIT";
    strategy=direction==="BULLISH"?"Call Debit Spread (wait for entry)":"Put Debit Spread (wait for entry)";
    expiration="21–45 DTE";
    confidence="Low";
  } else {
    decision="SKIP";
    strategy="No Trade";
    expiration="N/A";
    confidence="Low";
  }

  // Override to WAIT if too extended
  if(absChange>8&&decision==="TRADE"){decision="WAIT";warnings.push("Do not chase this move — wait for price to settle");}

  // DTE category for sections
  let section="skip";
  if(decision==="TRADE"&&direction==="BULLISH"&&expiration.includes("7–14")) section="weeklyCall";
  else if(decision==="TRADE"&&direction==="BULLISH") section="monthlyCall";
  else if(decision==="TRADE"&&direction==="BEARISH"&&expiration.includes("7–14")) section="weeklyPut";
  else if(decision==="TRADE"&&direction==="BEARISH") section="monthlyPut";
  else if(decision==="WAIT") section="wait";

  return{score,direction,decision,strategy,expiration,confidence,reasons,warnings,section,bullPoints,bearPoints,earnDays};
}

// ── Market signal helper ──────────────────────────────────────────────────────
function getMarketSignal(stock){
  if(!stock) return "neutral";
  const{ema20,ema50,price,macdHist}=stock;
  let bull=0,bear=0;
  if(ema20&&price>ema20)bull++;else bear++;
  if(ema50&&price>ema50)bull++;else bear++;
  if(macdHist>0)bull++;else bear++;
  return bull>bear?"bull":bear>bull?"bear":"neutral";
}

// ── Spread construction guidance ──────────────────────────────────────────────
function getSpreadGuidance(d,scoreData){
  const{direction,expiration,decision}=scoreData;
  if(decision==="SKIP") return null;
  const isBull=direction==="BULLISH";
  const dte=expiration.includes("7")?10:expiration.includes("21")?30:45;
  const price=d.price||100;

  if(isBull){
    const longStrike=(price*1.01).toFixed(0);
    const shortStrike=(price*1.06).toFixed(0);
    return{
      type:"Call Debit Spread",
      longLeg:`Buy $${longStrike} Call (look for ~0.50 delta)`,
      shortLeg:`Sell $${shortStrike} Call (look for ~0.30 delta)`,
      dte:`~${dte} DTE`,
      maxLoss:"Premium paid (limited risk)",
      target:"50–80% of max gain, or near resistance",
      stop:"Exit if spread loses 40–50% of what you paid",
      note:`Verify bid/ask spread is tight and open interest is high on your broker before entering`
    };
  } else {
    const longStrike=(price*0.99).toFixed(0);
    const shortStrike=(price*0.94).toFixed(0);
    return{
      type:"Put Debit Spread",
      longLeg:`Buy $${longStrike} Put (look for ~0.50 delta)`,
      shortLeg:`Sell $${shortStrike} Put (look for ~0.30 delta)`,
      dte:`~${dte} DTE`,
      maxLoss:"Premium paid (limited risk)",
      target:"50–80% of max gain, or near support",
      stop:"Exit if spread loses 40–50% of what you paid",
      note:`Verify bid/ask spread is tight and open interest is high on your broker before entering`
    };
  }
}

function mockStock(ticker){
  const seed=ticker.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const rng=s=>((Math.sin(s)*10000)%1+1)/2;
  const price=20+rng(seed)*480;
  return{ticker,live:false,price,change:(rng(seed*2)-0.45)*6,
    rsi:35+rng(seed*3)*40,ema20:price*(0.95+rng(seed*4)*0.1),
    ema50:price*(0.92+rng(seed*5)*0.1),macdHist:(rng(seed*6)-0.5)*2,
    ivRank:20+rng(seed*7)*60,earningsDays:Math.floor(rng(seed*8)*60)+7,
    support:price*0.93,resistance:price*1.07,bbUpper:price*1.05,bbLower:price*0.95,
    open:null,high:null,low:null,prevClose:null,sentiment:"neutral",newsHeadlines:[]};
}

async function fetchStock(ticker){
  try{
    const [qR,eR,nR,cR]=await Promise.all([
      fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_KEY}`),
      fetch(`https://finnhub.io/api/v1/calendar/earnings?symbol=${ticker}&token=${FINNHUB_KEY}`),
      fetch(`https://finnhub.io/api/v1/company-news?symbol=${ticker}&from=${getDateStr(-7)}&to=${getDateStr(0)}&token=${FINNHUB_KEY}`),
      fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${ticker}&resolution=D&from=${Math.floor(Date.now()/1000)-86400*220}&to=${Math.floor(Date.now()/1000)}&token=${FINNHUB_KEY}`)
    ]);
    const q=await qR.json(),e=await eR.json(),news=await nR.json(),candles=await cR.json();
    if(!q.c||q.c===0) return null;

    let earningsDays=999;
    if(e.earningsCalendar?.length>0){
      const nx=e.earningsCalendar.find(x=>new Date(x.date)>=new Date());
      if(nx) earningsDays=Math.round((new Date(nx.date)-new Date())/86400000);
    }

    let bull=0,bear=0;const newsHeadlines=[];
    if(Array.isArray(news)){
      news.slice(0,8).forEach(n=>{
        const t=(n.headline||"").toLowerCase();
        const b=["surge","jump","beat","rise","gain","upgrade","strong","bullish","rally"].some(w=>t.includes(w));
        const bd=["fall","drop","miss","decline","loss","downgrade","weak","bearish","crash"].some(w=>t.includes(w));
        if(b)bull++;if(bd)bear++;
        if(newsHeadlines.length<3) newsHeadlines.push({headline:n.headline,sentiment:b?"bullish":bd?"bearish":"neutral",source:n.source});
      });
    }
    const sentiment=bull>bear?"bullish":bear>bull?"bearish":"neutral";

    let rsi=50,ema20=null,ema50=null,macdHist=null,bbUpper=null,bbLower=null,support=null,resistance=null;
    if(candles.s==="ok"&&candles.c?.length>=15){
      const c=candles.c,h=candles.h,l=candles.l;
      rsi=calcRSI(c);
      if(c.length>=20) ema20=parseFloat(calcEMA(c,20).toFixed(2));
      if(c.length>=50) ema50=parseFloat(calcEMA(c,50).toFixed(2));
      const m=calcMACD(c);macdHist=m.hist;
      const bb=calcBB(c);bbUpper=bb.upper;bbLower=bb.lower;
      if(h&&l&&h.length>=20){
        const rH=h.slice(-20),rL=l.slice(-20);
        support=parseFloat((rL.slice().sort((a,b)=>a-b).slice(0,3).reduce((a,b)=>a+b,0)/3).toFixed(2));
        resistance=parseFloat((rH.slice().sort((a,b)=>b-a).slice(0,3).reduce((a,b)=>a+b,0)/3).toFixed(2));
      }
    }

    const change=q.pc>0?((q.c-q.pc)/q.pc)*100:0;
    return{ticker,live:true,price:q.c,change,open:q.o,high:q.h,low:q.l,prevClose:q.pc,
      rsi,ema20,ema50,macdHist,bbUpper,bbLower,support,resistance,ivRank:null,
      earningsDays,sentiment,newsHeadlines};
  }catch{return null;}
}

async function loadAllStocks(extraTickers,onProgress){
  const tickers=[...new Set([...ALL_TICKERS,...extraTickers])];
  const results=[];

  // Fetch all Tradier quotes in one batch call first (very fast)
  let tradierQuotes={};
  try{
    const symbols=tickers.join(",");
    const r=await fetch(`${TRADIER_BASE}/markets/quotes?symbols=${symbols}&greeks=false`,{
      headers:{"Authorization":`Bearer ${TRADIER_KEY}`,"Accept":"application/json"}
    });
    const d=await r.json();
    const quotes=d?.quotes?.quote;
    if(Array.isArray(quotes)){
      quotes.forEach(q=>{if(q.symbol) tradierQuotes[q.symbol]=q;});
    } else if(quotes?.symbol){
      tradierQuotes[quotes.symbol]=quotes;
    }
  }catch(e){console.warn("Tradier batch quote failed:",e);}

  // Now process each ticker
  for(let i=0;i<tickers.length;i++){
    const t=tickers[i];
    if(onProgress) onProgress(i+1,tickers.length,t);

    let stockData=null;

    // Try Tradier quote first
    const tq=tradierQuotes[t];
    if(tq&&tq.last){
      stockData={
        ticker:t,live:true,tradierLive:true,
        price:tq.last||tq.close,
        change:tq.change_percentage||0,
        open:tq.open,high:tq.high,low:tq.low,
        prevClose:tq.prevclose,volume:tq.volume,
        avgVolume:tq.average_volume,
        week52High:tq.week_52_high,week52Low:tq.week_52_low,
        ivRank:null,rsi:50,ema20:null,ema50:null,macdHist:null,
        bbUpper:null,bbLower:null,support:null,resistance:null,
        earningsDays:999,sentiment:"neutral",newsHeadlines:[],
        weeklyCallSpread:null,weeklyPutSpread:null,
        monthlyCallSpread:null,monthlyPutSpread:null,hasRealOptions:false
      };
    }

    // Get chart data from Finnhub (candles for indicators)
    try{
      const cRes=await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${t}&resolution=D&from=${Math.floor(Date.now()/1000)-86400*220}&to=${Math.floor(Date.now()/1000)}&token=${FINNHUB_KEY}`);
      const candles=await cRes.json();
      if(candles.s==="ok"&&candles.c?.length>=15){
        const c=candles.c,h=candles.h,l=candles.l;
        const rsi=calcRSI(c);
        const ema20=c.length>=20?parseFloat(calcEMA(c,20).toFixed(2)):null;
        const ema50=c.length>=50?parseFloat(calcEMA(c,50).toFixed(2)):null;
        const{hist:macdHist}=calcMACD(c);
        const{upper:bbUpper,lower:bbLower}=calcBB(c);
        let support=null,resistance=null;
        if(h&&l&&h.length>=20){
          const rH=h.slice(-20),rL=l.slice(-20);
          support=parseFloat((rL.slice().sort((a,b)=>a-b).slice(0,3).reduce((a,b)=>a+b,0)/3).toFixed(2));
          resistance=parseFloat((rH.slice().sort((a,b)=>b-a).slice(0,3).reduce((a,b)=>a+b,0)/3).toFixed(2));
        }
        if(stockData){
          stockData={...stockData,rsi,ema20,ema50,macdHist,bbUpper,bbLower,support,resistance};
        } else {
          // No Tradier quote — use last candle close
          const lastClose=c[c.length-1];
          const prevClose=c[c.length-2]||lastClose;
          stockData={
            ticker:t,live:false,tradierLive:false,
            price:lastClose,change:prevClose>0?((lastClose-prevClose)/prevClose)*100:0,
            open:null,high:h?h[h.length-1]:null,low:l?l[l.length-1]:null,
            prevClose,volume:null,avgVolume:null,
            rsi,ema20,ema50,macdHist,bbUpper,bbLower,support,resistance,
            ivRank:null,earningsDays:999,sentiment:"neutral",newsHeadlines:[],
            weeklyCallSpread:null,weeklyPutSpread:null,
            monthlyCallSpread:null,monthlyPutSpread:null,hasRealOptions:false
          };
        }
      }
    }catch{}

    // Get news + earnings from Finnhub
    try{
      const[nRes,eRes]=await Promise.all([
        fetch(`https://finnhub.io/api/v1/company-news?symbol=${t}&from=${getDateStr(-7)}&to=${getDateStr(0)}&token=${FINNHUB_KEY}`),
        fetch(`https://finnhub.io/api/v1/calendar/earnings?symbol=${t}&token=${FINNHUB_KEY}`)
      ]);
      const news=await nRes.json();
      const earnings=await eRes.json();

      let bull=0,bear=0;const newsHeadlines=[];
      if(Array.isArray(news)){
        news.slice(0,8).forEach(n=>{
          const txt=(n.headline||"").toLowerCase();
          const b=["surge","jump","beat","rise","gain","upgrade","strong","bullish","rally"].some(w=>txt.includes(w));
          const bd=["fall","drop","miss","decline","loss","downgrade","weak","bearish","crash"].some(w=>txt.includes(w));
          if(b)bull++;if(bd)bear++;
          if(newsHeadlines.length<3) newsHeadlines.push({headline:n.headline,sentiment:b?"bullish":bd?"bearish":"neutral",source:n.source});
        });
      }
      const sentiment=bull>bear?"bullish":bear>bull?"bearish":"neutral";

      let earningsDays=999;
      if(earnings.earningsCalendar?.length>0){
        const nx=earnings.earningsCalendar.find(x=>new Date(x.date)>=new Date());
        if(nx) earningsDays=Math.round((new Date(nx.date)-new Date())/86400000);
      }

      if(stockData){stockData={...stockData,sentiment,newsHeadlines,earningsDays};}
    }catch{}

    // Fallback to mock if nothing worked
    if(!stockData) stockData=mockStock(t);

    // Estimate IV rank if not set
    if(stockData.ivRank===null){
      const s=t.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
      stockData.ivRank=((Math.sin(s*6)*10000)%1+1)/2*100;
    }

    results.push(stockData);

    // Small throttle for Finnhub
    if(i<tickers.length-1) await new Promise(r=>setTimeout(r,120));
  }
  return results;
}

// Fetch real options data for a specific stock (called on demand when viewing detail)
async function enrichWithOptions(ticker,currentPrice,direction){
  try{
    const options=await fetchTradierOptions(ticker);
    if(!options) return null;
    const allContracts=[...(options.weeklyChain||[]),...(options.monthlyChain||[])];
    const ivRank=calcIVRankFromChain(allContracts);
    const weeklyCallSpread=options.weeklyChain?findBestSpread(options.weeklyChain,"BULLISH",currentPrice):null;
    const weeklyPutSpread=options.weeklyChain?findBestSpread(options.weeklyChain,"BEARISH",currentPrice):null;
    const monthlyCallSpread=options.monthlyChain?findBestSpread(options.monthlyChain,"BULLISH",currentPrice):null;
    const monthlyPutSpread=options.monthlyChain?findBestSpread(options.monthlyChain,"BEARISH",currentPrice):null;
    return{ivRank,weeklyExpiry:options.weeklyExpiry,monthlyExpiry:options.monthlyExpiry,
      weeklyCallSpread,weeklyPutSpread,monthlyCallSpread,monthlyPutSpread,hasRealOptions:true};

}

      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,

async function getAfterHoursPicks(stocks){
  const spyData=stocks.find(s=>s.ticker==="SPY");
  const qqqData=stocks.find(s=>s.ticker==="QQQ");
  const spySig=getMarketSignal(spyData);
  const qqqSig=getMarketSignal(qqqData);

  const top=stocks
    .map(s=>({...s,scoreData:scoreStock(s,spySig,qqqSig)}))
    .filter(s=>s.scoreData.decision==="TRADE"||s.scoreData.decision==="WAIT")
    .sort((a,b)=>b.scoreData.score-a.scoreData.score)
    .slice(0,15);

  const dataStr=top.map(s=>{
    const sd=s.scoreData;
    return`${s.ticker} (${getCompanyName(s.ticker)}) [${getSector(s.ticker)}]:
  Score: ${sd.score}/100 | Direction: ${sd.direction} | Decision: ${sd.decision}
  Price: $${s.price?.toFixed(2)} | Change: ${s.change?.toFixed(2)}% | RSI: ${s.rsi?.toFixed(0)}
  20-day avg: ${s.ema20?"$"+s.ema20+" (price "+(s.price>s.ema20?"ABOVE":"BELOW")+")":"N/A"}
  50-day avg: ${s.ema50?"$"+s.ema50+" (price "+(s.price>s.ema50?"ABOVE":"BELOW")+")":"N/A"}
  Momentum: ${s.macdHist>0?"building up":"fading down"}
  IV Rank: ${s.ivRank?.toFixed(0)}% | Earnings: ${s.earningsDays<999?s.earningsDays+"d away":"clear"}
  Reasons: ${sd.reasons.slice(0,2).join(", ")}`;
  }).join("\n\n");

  const raw=await callClaude(
    `You are an expert swing options trading coach. Pick the single best weekly debit spread and monthly debit spread from the data. Prioritize defined-risk call or put debit spreads for 7-45 DTE. Write reasoning in plain English. JSON only, no markdown. Schema: {"weekly":{"ticker":"","direction":"BULLISH|BEARISH","strategy":"Call Debit Spread|Put Debit Spread","confidence":0-10,"reasoning":"2-3 plain English sentences","suggestedPlay":"specific spread guidance","keyRisk":"one plain sentence","bestEntry":"one sentence on when to enter"},"monthly":{"ticker":"","direction":"BULLISH|BEARISH","strategy":"Call Debit Spread|Put Debit Spread","confidence":0-10,"reasoning":"2-3 plain English sentences","suggestedPlay":"specific spread guidance","keyRisk":"one plain sentence","bestEntry":"one sentence on when to enter"}}`,
    `After hours swing options analysis. Market is closed.\n\nTop setups:\n\n${dataStr}\n\nPick the best weekly (7-14 DTE) and monthly (21-45 DTE) debit spread trades. Return ONLY JSON.`
  );
  try{
    const cleaned=raw.replace(/```json|```/g,"").trim();
    const result=JSON.parse(cleaned);
    if(result?.weekly&&result?.monthly) return result;
  }catch{}
  // Fallback
  const bestTrade=top.find(s=>s.scoreData.decision==="TRADE");
  return{
    weekly:{ticker:bestTrade?.ticker||"SPY",direction:"BULLISH",strategy:"Call Debit Spread",confidence:5,
      reasoning:"Market data is limited right now. This is a default suggestion based on available signals. Regenerate during market hours for a more specific recommendation.",
      suggestedPlay:"Buy a call spread slightly above current price, 7-14 DTE. Start with 1 contract.",
      keyRisk:"Limited data — verify setup on your broker before entering.",
      bestEntry:"Wait for Monday market open and confirm direction before entering."},
    monthly:{ticker:bestTrade?.ticker||"QQQ",direction:"BULLISH",strategy:"Call Debit Spread",confidence:5,
      reasoning:"QQQ tracks the Nasdaq 100 tech and AI stocks. Default monthly suggestion based on trend analysis.",
      suggestedPlay:"Buy a call spread 2-3% above current price, 30-45 DTE.",
      keyRisk:"Verify options liquidity on your broker. Check open interest before entering.",
      bestEntry:"Look for a small pullback before entering to get better pricing on the spread."}
  };
}

                <span style={{fontSize:15,fontWeight:600,color:C.text}}>{stock.ticker}</span>
                <LiveDot live={stock.live}/>
              </div>
              <div style={{fontSize:11,color:C.text3}}>{getCompanyName(stock.ticker)} · {getSector(stock.ticker)}</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:600,color:C.text,fontFamily:"'DM Mono',monospace"}}>${stock.price?.toFixed(2)}</div>
              <div style={{fontSize:12,color:stock.change>=0?C.green:C.red,fontFamily:"'DM Mono',monospace"}}>{stock.change>=0?"+":""}{stock.change?.toFixed(2)}%</div>
            </div>
          </div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:8}}>
            <DecisionBadge decision={scoreData.decision}/>
            <Chip label={scoreData.direction} color={isBull?C.green:scoreData.direction==="BEARISH"?C.red:C.text2}/>
            {scoreData.decision!=="SKIP"&&<Chip label={scoreData.strategy.replace(" (wait for entry)","")} color={C.blue} size={9}/>}
            <Chip label={`${scoreData.confidence} conf.`} color={confidenceColor(scoreData.confidence)} size={9}/>
          </div>
        </div>
      </div>
      {/* Score bar */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
        <div style={{fontSize:10,color:C.text3,fontFamily:"'DM Mono',monospace",flexShrink:0,width:56}}>Score {scoreData.score}</div>
        <div style={{flex:1,height:5,background:C.bg3,borderRadius:999,overflow:"hidden"}}>
          <div style={{width:`${scoreData.score}%`,height:"100%",background:scoreData.score>=70?C.green:scoreData.score>=45?C.amber:C.red,borderRadius:999,transition:"width 0.6s"}}/>
        </div>
        <div style={{fontSize:10,color:C.text3,fontFamily:"'DM Mono',monospace",flexShrink:0}}>{scoreData.expiration}</div>
      </div>
      {/* Top reason */}
      {scoreData.reasons[0]&&<div style={{fontSize:11,color:C.text2,lineHeight:1.5,marginBottom:4}}>✓ {scoreData.reasons[0]}</div>}
      {scoreData.warnings[0]&&<div style={{fontSize:11,color:C.amber,lineHeight:1.5}}>⚠ {scoreData.warnings[0]}</div>}
    </div>
  );
}

// ── Stock Detail ──────────────────────────────────────────────────────────────
function StockDetail({stock,scoreData,onClose,onLogTrade}){
  const [read,setRead]=useState(null);
  const [readLoading,setReadLoading]=useState(false);
  const [optionsData,setOptionsData]=useState(null);
  const [optionsLoading,setOptionsLoading]=useState(false);
  const dc=decisionColor(scoreData.decision);

  // Load real options data from Tradier when detail opens
  useEffect(()=>{
    if(scoreData.decision==="SKIP") return;
    setOptionsLoading(true);
    enrichWithOptions(stock.ticker,stock.price,scoreData.direction).then(d=>{
      setOptionsData(d);
      setOptionsLoading(false);
    });
  },[stock.ticker]);

  // Use real options data if available, else fall back to estimates
  const realSpread=optionsData?(
    scoreData.direction==="BULLISH"
      ?(scoreData.expiration.includes("7")?optionsData.weeklyCallSpread:optionsData.monthlyCallSpread)
      :(scoreData.expiration.includes("7")?optionsData.weeklyPutSpread:optionsData.monthlyPutSpread)
  ):null;
  const estimatedSpread=getSpreadGuidance(stock,scoreData);

  const handleRead=async()=>{
    setReadLoading(true);setRead(null);
    const r=await getPlainEnglishRead(stock,scoreData);
    setRead(r);setReadLoading(false);
  };

  return(
    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:200,overflowY:"auto",animation:"fadeUp 0.2s ease"}}>
      {/* Header */}
      <div style={{padding:16,borderBottom:`1px solid ${C.border}`,background:C.bg,position:"sticky",top:0,zIndex:10}}>
        <button onClick={onClose} style={{...ghostBtn,display:"flex",alignItems:"center",gap:6,marginBottom:14,padding:"8px 14px"}}>
          <span>←</span><span>Back</span>
        </button>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <TickerLogo ticker={stock.ticker} size={52}/>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
              <span style={{fontSize:22,fontWeight:600,color:C.text}}>{stock.ticker}</span>
              <LiveDot live={stock.live}/>
            </div>
            <div style={{fontSize:12,color:C.text3,marginBottom:4}}>{getCompanyName(stock.ticker)} · {getSector(stock.ticker)}</div>
            <div style={{fontSize:26,fontWeight:300,color:C.text,fontFamily:"'DM Serif Display',serif"}}>${stock.price?.toFixed(2)}</div>
            <div style={{fontSize:13,color:stock.change>=0?C.green:C.red,fontFamily:"'DM Mono',monospace"}}>{stock.change>=0?"+":""}{stock.change?.toFixed(2)}% today</div>
          </div>
        </div>
      </div>

      <div style={{padding:16,display:"flex",flexDirection:"column",gap:12}}>
        {/* Final Decision */}
        <div style={{background:decisionBg(scoreData.decision),border:`1px solid ${dc}30`,borderRadius:14,padding:16}}>
          <div style={{fontSize:10,color:dc,fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:8}}>FINAL DECISION</div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <DecisionBadge decision={scoreData.decision} size={16}/>
            <div style={{fontSize:22,fontWeight:400,color:dc,fontFamily:"'DM Serif Display',serif"}}>{scoreData.score}/100</div>
            <Chip label={`${scoreData.confidence} Confidence`} color={confidenceColor(scoreData.confidence)} size={11}/>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <Chip label={scoreData.direction} color={scoreData.direction==="BULLISH"?C.green:scoreData.direction==="BEARISH"?C.red:C.text2} size={12}/>
            <Chip label={scoreData.strategy.replace(" (wait for entry)","")} color={C.blue} size={11}/>
            <Chip label={scoreData.expiration} color={C.gold} size={11}/>
          </div>
        </div>

        {/* Score breakdown */}
        <div style={card}>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.text2,letterSpacing:2,fontFamily:"'DM Mono',monospace"}}>📊 SCORE BREAKDOWN</div>
          <div style={{padding:14,display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,height:4,background:C.bg3,borderRadius:999,overflow:"hidden"}}>
                <div style={{width:`${scoreData.score}%`,height:"100%",background:scoreData.score>=70?C.green:scoreData.score>=45?C.amber:C.red,borderRadius:999}}/>
              </div>
              <span style={{fontSize:13,fontWeight:600,color:scoreData.score>=70?C.green:scoreData.score>=45?C.amber:C.red,fontFamily:"'DM Mono',monospace",flexShrink:0}}>{scoreData.score}/100</span>
            </div>
            {scoreData.reasons.map((r,i)=>(
              <div key={i} style={{display:"flex",gap:8,padding:"6px 10px",background:"rgba(0,200,150,0.06)",borderRadius:8}}>
                <span style={{color:C.green,flexShrink:0}}>✓</span>
                <span style={{fontSize:12,color:C.text2}}>{r}</span>
              </div>
            ))}
            {scoreData.warnings.map((w,i)=>(
              <div key={i} style={{display:"flex",gap:8,padding:"6px 10px",background:"rgba(245,158,11,0.06)",borderRadius:8}}>
                <span style={{color:C.amber,flexShrink:0}}>⚠</span>
                <span style={{fontSize:12,color:C.text2}}>{w}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Real Options Chain from Tradier */}
        {scoreData.decision!=="SKIP"&&(
          <div style={card}>
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.blue,letterSpacing:2,fontFamily:"'DM Mono',monospace",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>📐 {scoreData.direction==="BULLISH"?"CALL":"PUT"} DEBIT SPREAD</span>
              {optionsData?.hasRealOptions&&<span style={{fontSize:9,color:C.green,background:"rgba(0,200,150,0.15)",padding:"2px 8px",borderRadius:4}}>● LIVE TRADIER DATA</span>}
              {optionsLoading&&<span style={{fontSize:9,color:C.amber}}>Loading options…</span>}
            </div>
            <div style={{padding:14,display:"flex",flexDirection:"column",gap:10}}>
              {realSpread?(
                <>
                  {/* Real spread from Tradier */}
                  <div style={{background:"rgba(0,200,150,0.06)",borderRadius:10,padding:12,border:`1px solid ${C.green}20`}}>
                    <div style={{fontSize:10,color:C.green,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:6}}>BUY (LONG LEG) — {scoreData.direction==="BULLISH"?"CALL":"PUT"}</div>
                    <div style={{fontSize:15,fontWeight:600,color:C.text,fontFamily:"'DM Mono',monospace",marginBottom:4}}>${realSpread.longStrike} strike</div>
                    <div style={{display:"flex",gap:12,fontSize:11,color:C.text2,flexWrap:"wrap"}}>
                      <span>Delta: <span style={{color:C.text}}>{realSpread.longDelta}</span></span>
                      <span>Bid: <span style={{color:C.text}}>${realSpread.longBid}</span></span>
                      <span>Ask: <span style={{color:C.text}}>${realSpread.longAsk}</span></span>
                      <span>OI: <span style={{color:realSpread.longOI>100?C.green:C.amber}}>{realSpread.longOI?.toLocaleString()}</span></span>
                    </div>
                  </div>
                  <div style={{background:"rgba(240,70,90,0.06)",borderRadius:10,padding:12,border:`1px solid ${C.red}20`}}>
                    <div style={{fontSize:10,color:C.red,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:6}}>SELL (SHORT LEG) — {scoreData.direction==="BULLISH"?"CALL":"PUT"}</div>
                    <div style={{fontSize:15,fontWeight:600,color:C.text,fontFamily:"'DM Mono',monospace",marginBottom:4}}>${realSpread.shortStrike} strike</div>
                    <div style={{display:"flex",gap:12,fontSize:11,color:C.text2,flexWrap:"wrap"}}>
                      <span>Delta: <span style={{color:C.text}}>{realSpread.shortDelta}</span></span>
                      <span>Bid: <span style={{color:C.text}}>${realSpread.shortBid}</span></span>
                      <span>Ask: <span style={{color:C.text}}>${realSpread.shortAsk}</span></span>
                      <span>OI: <span style={{color:realSpread.shortOI>100?C.green:C.amber}}>{realSpread.shortOI?.toLocaleString()}</span></span>
                    </div>
                  </div>
                  {/* Spread metrics */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {[
                      ["MAX COST (DEBIT)",`$${realSpread.debit}`,C.red],
                      ["MAX GAIN",`$${realSpread.maxGain}`,C.green],
                      ["RISK/REWARD",`${realSpread.riskReward}:1`,realSpread.riskRewardGood?C.green:C.amber],
                      ["SPREAD WIDTH",`$${realSpread.spreadWidth}`,C.text2],
                      ["THETA (decay/day)",realSpread.theta,C.amber],
                      ["LIQUIDITY",realSpread.liquidityGood?"GOOD ✓":"CHECK ⚠",realSpread.liquidityGood?C.green:C.amber]
                    ].map(([l,v,c])=>(
                      <div key={l} style={{background:C.bg3,borderRadius:8,padding:"8px 10px"}}>
                        <div style={{fontSize:9,color:C.text3,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:3}}>{l}</div>
                        <div style={{fontSize:13,fontWeight:600,color:c}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  {/* Expiry */}
                  <div style={{background:"rgba(201,168,76,0.08)",borderRadius:8,padding:10,border:`1px solid ${C.gold}20`}}>
                    <div style={{fontSize:10,color:C.gold,fontFamily:"'DM Mono',monospace",marginBottom:3}}>EXPIRATION</div>
                    <div style={{fontSize:13,color:C.text}}>{scoreData.expiration.includes("7")?optionsData?.weeklyExpiry:optionsData?.monthlyExpiry} ({scoreData.expiration})</div>
                  </div>
                  {/* Profit/Stop guidance */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <div style={{background:"rgba(0,200,150,0.06)",borderRadius:8,padding:10,border:`1px solid ${C.green}20`}}>
                      <div style={{fontSize:9,color:C.green,fontFamily:"'DM Mono',monospace",marginBottom:3}}>PROFIT TARGET</div>
                      <div style={{fontSize:12,color:C.text2}}>Exit at 50–80% gain (~${(realSpread.maxGain*0.65).toFixed(2)} profit)</div>
                    </div>
                    <div style={{background:"rgba(240,70,90,0.06)",borderRadius:8,padding:10,border:`1px solid ${C.red}20`}}>
                      <div style={{fontSize:9,color:C.red,fontFamily:"'DM Mono',monospace",marginBottom:3}}>STOP LOSS</div>
                      <div style={{fontSize:12,color:C.text2}}>Exit if spread loses 40–50% (~${(realSpread.debit*0.5).toFixed(2)} loss)</div>
                    </div>
                  </div>
                  {!realSpread.liquidityGood&&(
                    <div style={{background:"rgba(245,158,11,0.08)",borderRadius:8,padding:10,border:`1px solid ${C.amber}20`}}>
                      <div style={{fontSize:11,color:C.amber}}>⚠ Check liquidity on your broker before entering — open interest may be low or bid/ask spread may be wide</div>
                    </div>
                  )}
                </>
              ):optionsLoading?(
                <div style={{textAlign:"center",padding:20,color:C.blue,fontFamily:"'DM Mono',monospace",fontSize:11}}>
                  <div style={{fontSize:18,display:"inline-block",animation:"spin 1s linear infinite",marginBottom:6}}>◌</div>
                  <div>Loading real options chain from Tradier…</div>
                </div>
              ):(
                // Fallback to estimated spread
                estimatedSpread&&(
                  <>
                    <div style={{background:"rgba(245,158,11,0.06)",borderRadius:8,padding:10,marginBottom:4,border:`1px solid ${C.amber}20`}}>
                      <div style={{fontSize:11,color:C.amber}}>⚠ Estimated spread — real options data unavailable for this ticker right now</div>
                    </div>
                    <div style={{background:"rgba(0,200,150,0.06)",borderRadius:10,padding:12,border:`1px solid ${C.green}20`}}>
                      <div style={{fontSize:10,color:C.green,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:4}}>BUY (LONG LEG)</div>
                      <div style={{fontSize:13,color:C.text,fontWeight:500}}>{estimatedSpread.longLeg}</div>
                    </div>
                    <div style={{background:"rgba(240,70,90,0.06)",borderRadius:10,padding:12,border:`1px solid ${C.red}20`}}>
                      <div style={{fontSize:10,color:C.red,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:4}}>SELL (SHORT LEG)</div>
                      <div style={{fontSize:13,color:C.text,fontWeight:500}}>{estimatedSpread.shortLeg}</div>
                    </div>
                    <div style={{background:"rgba(59,130,246,0.08)",borderRadius:8,padding:10,border:`1px solid ${C.blue}20`}}>
                      <div style={{fontSize:11,color:C.blue}}>{estimatedSpread.note}</div>
                    </div>
                  </>
                )
              )}
            </div>
          </div>
        )}

        {/* Key levels */}
        {(stock.support||stock.resistance||stock.ema20||stock.ema50)&&(
          <div style={card}>
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.text2,letterSpacing:2,fontFamily:"'DM Mono',monospace"}}>📍 KEY LEVELS</div>
            <div style={{padding:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[[`20-day avg`,stock.ema20,stock.price>stock.ema20?C.green:C.red],
                [`50-day avg`,stock.ema50,stock.price>stock.ema50?C.green:C.red],
                ["Support",stock.support,C.green],["Resistance",stock.resistance,C.red]].map(([l,v,c])=>v?(
                <div key={l} style={{background:C.bg3,borderRadius:8,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:C.text3,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:3}}>{l.toUpperCase()}</div>
                  <div style={{fontSize:13,fontWeight:500,color:c,fontFamily:"'DM Mono',monospace"}}>${v}</div>
                  <div style={{fontSize:9,color:C.text3,marginTop:2}}>{stock.price>v?"Price above ↑":"Price below ↓"}</div>
                </div>
              ):null)}
            </div>
          </div>
        )}

        {/* RSI + IV */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
            <div style={{fontSize:9,color:C.text3,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:6}}>RSI</div>
            <div style={{fontSize:22,fontWeight:500,color:stock.rsi>70?C.red:stock.rsi<30?C.green:C.amber,fontFamily:"'DM Serif Display',serif"}}>{stock.rsi?.toFixed(0)}</div>
            <div style={{fontSize:10,color:C.text2,marginTop:4}}>{stock.rsi>70?"Overbought":stock.rsi<30?"Oversold":"Healthy range"}</div>
            <div style={{height:4,background:C.bg3,borderRadius:999,overflow:"hidden",marginTop:8}}>
              <div style={{width:`${stock.rsi||50}%`,height:"100%",background:stock.rsi>70?C.red:stock.rsi<30?C.green:C.amber,borderRadius:999}}/>
            </div>
          </div>
          <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
            <div style={{fontSize:9,color:C.text3,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:6}}>IV RANK</div>
            <div style={{fontSize:22,fontWeight:500,color:stock.ivRank>70?C.red:stock.ivRank<30?C.green:C.amber,fontFamily:"'DM Serif Display',serif"}}>{stock.ivRank?.toFixed(0)}%</div>
            <div style={{fontSize:10,color:C.text2,marginTop:4}}>{stock.ivRank>70?"Options expensive":stock.ivRank<30?"Options cheap":"Normal pricing"}</div>
          </div>
        </div>

        {/* Earnings */}
        {stock.earningsDays<45&&stock.earningsDays<999&&(
          <div style={{background:stock.earningsDays<14?"rgba(240,70,90,0.08)":"rgba(245,158,11,0.08)",border:`1px solid ${stock.earningsDays<14?C.red:C.amber}30`,borderRadius:12,padding:14}}>
            <div style={{fontSize:12,fontWeight:600,color:stock.earningsDays<14?C.red:C.amber,marginBottom:4}}>
              {stock.earningsDays<14?"⚠ EARNINGS VERY SOON":"📅 Earnings Coming Up"} — {stock.earningsDays} days
            </div>
            <div style={{fontSize:12,color:C.text2,lineHeight:1.6}}>
              {stock.earningsDays<7?"Avoid options trades before earnings — the risk is too high unless you specifically want an earnings play.":stock.earningsDays<21?"Use shorter expirations or wait until after earnings to enter a clean setup.":"Factor earnings into your expiration choice — avoid spreads that expire right around earnings date."}
            </div>
          </div>
        )}

        {/* News */}
        {stock.newsHeadlines?.length>0&&(
          <div style={card}>
            <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.text2,letterSpacing:2,fontFamily:"'DM Mono',monospace"}}>📰 RECENT NEWS</div>
            <div style={{padding:14,display:"flex",flexDirection:"column",gap:8}}>
              {stock.newsHeadlines.map((n,i)=>{
                const nc=n.sentiment==="bullish"?C.green:n.sentiment==="bearish"?C.red:C.text3;
                return(
                  <div key={i} style={{padding:"8px 10px",background:C.bg3,borderRadius:8,border:`1px solid ${nc}20`}}>
                    <div style={{fontSize:9,color:nc,fontFamily:"'DM Mono',monospace",marginBottom:3}}>{n.sentiment.toUpperCase()} · {n.source}</div>
                    <div style={{fontSize:12,color:C.text2,lineHeight:1.4}}>{n.headline}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Plain English Read */}
        <div style={{background:"rgba(201,168,76,0.06)",border:`1px solid ${C.gold}25`,borderRadius:14,padding:16}}>
          <div style={{fontSize:13,fontWeight:600,color:C.goldLt,marginBottom:6}}>💬 Plain English Trade Read</div>
          <div style={{fontSize:12,color:C.text2,marginBottom:12,lineHeight:1.6}}>Tap below for a plain English explanation of this setup — what the chart is saying, whether now is a good time to enter, and exactly what to watch for.</div>
          {!read&&!readLoading&&(
            <button onClick={handleRead} style={goldBtn}>💬 Explain This Trade</button>
          )}
          {readLoading&&(
            <div style={{textAlign:"center",padding:20,color:C.gold,fontFamily:"'DM Mono',monospace",fontSize:11}}>
              <div style={{fontSize:20,display:"inline-block",animation:"spin 1s linear infinite",marginBottom:8}}>◌</div>
              <div>Analyzing setup…</div>
            </div>
          )}
          {read&&(
            <div style={{animation:"fadeUp 0.3s ease"}}>
              <div style={{fontSize:13,color:C.text,lineHeight:1.8,marginBottom:12}}>{read}</div>
              <button onClick={handleRead} style={{...ghostBtn,fontSize:12,width:"100%",textAlign:"center"}}>⟳ Refresh</button>
            </div>
          )}
        </div>

        {/* Log Trade Button */}
        <button onClick={()=>onLogTrade(stock,scoreData)} style={{...goldBtn,background:"linear-gradient(135deg,#3b82f6,#60a5fa,#3b82f6)",boxShadow:"0 4px 20px rgba(59,130,246,0.25)"}}>
          + Log This Trade to Tracker
        </button>
      </div>
    </div>
  );
}

// ── Section component ─────────────────────────────────────────────────────────
function SectionCard({title,color,emoji,stocks,scoreMap,onClick,defaultCollapsed=false}){
  const [open,setOpen]=useState(!defaultCollapsed);
  if(stocks.length===0) return null;
  return(
    <div style={card}>
      <div onClick={()=>setOpen(!open)} style={{padding:"12px 16px",borderBottom:open?`1px solid ${C.border}`:"none",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
        <div style={{fontSize:12,color,fontFamily:"'DM Mono',monospace",fontWeight:600,letterSpacing:1}}>{emoji} {title} ({stocks.length})</div>
        <span style={{color:C.text3,fontSize:14}}>{open?"▲":"▼"}</span>
      </div>
      {open&&stocks.map(s=><StockCard key={s.ticker} stock={s} scoreData={scoreMap[s.ticker]} onClick={onClick}/>)}
    </div>
  );
}

// ── After Hours Pick Card ─────────────────────────────────────────────────────
function AHPickCard({pick,label}){
  if(!pick) return null;
  const bull=pick.direction==="BULLISH";
  return(
    <div style={{background:C.bg2,border:`1px solid rgba(59,130,246,0.25)`,borderRadius:16,overflow:"hidden",marginBottom:12,animation:"fadeUp 0.3s ease"}}>
      <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(59,130,246,0.05)"}}>
        <div style={{fontSize:10,color:"#60a5fa",fontFamily:"'DM Mono',monospace",fontWeight:600,letterSpacing:1}}>🌙 {label}</div>
        <div style={{fontSize:10,color:C.text3,fontFamily:"'DM Mono',monospace"}}>{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
      </div>
      <div style={{padding:16}}>

          <div style={{fontSize:9,color:C.gold,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:4}}>SUGGESTED PLAY</div>
          <div style={{fontSize:13,color:C.text,fontWeight:500}}>{pick.suggestedPlay}</div>

        {pick.bestEntry&&(
          <div style={{background:"rgba(59,130,246,0.08)",borderRadius:10,padding:10,marginBottom:8,border:`1px solid ${C.blue}20`}}>
            <div style={{fontSize:9,color:"#60a5fa",fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:3}}>📍 ENTRY</div>
            <div style={{fontSize:12,color:C.text2}}>{pick.bestEntry}</div>

        )}
        <div style={{background:"rgba(240,70,90,0.06)",borderRadius:10,padding:10,border:`1px solid ${C.red}20`}}>
          <div style={{fontSize:9,color:C.red,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:3}}>⚠ KEY RISK</div>
          <div style={{fontSize:12,color:C.text2}}>{pick.keyRisk}</div>
        </div>
      </div>
    </div>
  );
}

// ── Trade Tracker ─────────────────────────────────────────────────────────────
function TradeTrackerTab({trades,onUpdateTrade,onDeleteTrade}){
  const wins=trades.filter(t=>t.result==="Win").length;
  const losses=trades.filter(t=>t.result==="Loss").length;
  const total=trades.length;
  const winRate=total>0?Math.round((wins/total)*100):0;

  return(
    <div style={{padding:16}}>
      {/* Dashboard */}
      {total>0&&(
        <div style={card}>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.text2,letterSpacing:2,fontFamily:"'DM Mono',monospace"}}>📈 PERFORMANCE DASHBOARD</div>
          <div style={{padding:14,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {[["TRADES",total,C.gold],["WINS",wins,C.green],["LOSSES",losses,C.red],["WIN RATE",`${winRate}%`,winRate>=50?C.green:C.red],["CALL SPREADS",trades.filter(t=>t.strategy?.includes("Call")).length,C.blue],["PUT SPREADS",trades.filter(t=>t.strategy?.includes("Put")).length,C.purple]].map(([l,v,c])=>(
              <div key={l} style={{background:C.bg3,borderRadius:10,padding:10,textAlign:"center"}}>
                <div style={{fontSize:9,color:C.text3,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:4}}>{l}</div>
                <div style={{fontSize:16,fontWeight:600,color:c,fontFamily:"'DM Mono',monospace"}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Trades list */}
      {trades.length===0?(
        <div style={{textAlign:"center",padding:48,color:C.text3}}>
          <div style={{fontSize:36,marginBottom:12}}>📋</div>
          <div style={{fontSize:15,color:C.text2,marginBottom:6}}>No trades logged yet</div>
          <div style={{fontSize:13,lineHeight:1.7}}>Tap any stock in the Scanner → scroll to bottom → tap "Log This Trade to Tracker"</div>
        </div>
      ):(
        <div style={card}>
          <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.text2,letterSpacing:2,fontFamily:"'DM Mono',monospace"}}>📋 ALL TRADES ({trades.length})</div>
          {trades.map((t,i)=>(
            <div key={t.id} style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:15,fontWeight:600,color:C.text}}>{t.ticker}</span>
                    <Chip label={t.direction} color={t.direction==="BULLISH"?C.green:C.red} size={10}/>
                    <Chip label={t.strategy?.replace(" Debit Spread","DS")} color={C.blue} size={9}/>
                  </div>
                  <div style={{fontSize:11,color:C.text3}}>Entry: ${t.price?.toFixed(2)} · Score: {t.score}/100 · {t.expiration}</div>
                  <div style={{fontSize:10,color:C.text3,marginTop:2}}>{new Date(t.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
                </div>
                <button onClick={()=>onDeleteTrade(t.id)} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:18}}>×</button>
              </div>
              {/* Result selector */}
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:10,color:C.text3,fontFamily:"'DM Mono',monospace"}}>RESULT:</span>
                {["Open","Win","Loss","Expired"].map(r=>(
                  <button key={r} onClick={()=>onUpdateTrade(t.id,{result:r})} style={{padding:"3px 10px",borderRadius:6,border:`1px solid ${t.result===r?(r==="Win"?C.green:r==="Loss"?C.red:C.gold):C.border}`,background:t.result===r?(r==="Win"?"rgba(0,200,150,0.15)":r==="Loss"?"rgba(240,70,90,0.15)":"rgba(201,168,76,0.15)"):"transparent",color:t.result===r?(r==="Win"?C.green:r==="Loss"?C.red:C.gold):C.text3,fontSize:10,cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>{r}</button>
                ))}
              </div>
              {t.notes&&<div style={{fontSize:11,color:C.text2,marginTop:6,lineHeight:1.5}}>{t.notes}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Log Trade Modal ───────────────────────────────────────────────────────────
function LogTradeModal({stock,scoreData,onSave,onClose}){
  const [notes,setNotes]=useState("");
  const handleSave=()=>{
    const trade={
      id:Date.now(),date:new Date().toISOString(),
      ticker:stock.ticker,price:stock.price,change:stock.change,
      direction:scoreData.direction,strategy:scoreData.strategy,
      expiration:scoreData.expiration,score:scoreData.score,
      confidence:scoreData.confidence,result:"Open",notes,
      entryTrigger:scoreData.reasons[0]||"",
      warning:scoreData.warnings[0]||""
    };
    onSave(trade);onClose();
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(5,10,25,0.95)",zIndex:300,display:"flex",flexDirection:"column",justifyContent:"flex-end",animation:"fadeUp 0.2s ease"}}>
      <div style={{background:C.bg2,borderRadius:"20px 20px 0 0",padding:20,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:16,fontWeight:600,color:C.text,marginBottom:4}}>Log Trade — {stock.ticker}</div>
        <div style={{fontSize:12,color:C.text3,marginBottom:16}}>{scoreData.strategy} · {scoreData.expiration} · Score {scoreData.score}/100</div>
        <label style={lbl}>NOTES (optional)</label>
        <textarea style={{...inp,minHeight:70,lineHeight:1.5,marginBottom:12}} placeholder="Entry price paid, specific strikes used, your thesis..." value={notes} onChange={e=>setNotes(e.target.value)}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button onClick={onClose} style={{...ghostBtn,textAlign:"center"}}>Cancel</button>
          <button onClick={handleSave} style={{...goldBtn,marginTop:0}}>Save Trade</button>
        </div>
      </div>
    </div>
  );
}

      <div style={{width:56,height:56,borderRadius:14,background:`linear-gradient(135deg,${C.gold},${C.goldLt})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 30px rgba(201,168,76,0.5)`,marginBottom:24,animation:"glow 2s infinite"}}>
        <span style={{fontSize:26,fontWeight:400,color:"#0a0f1e",fontFamily:"'DM Serif Display',serif",fontStyle:"italic"}}>L</span>
      </div>
      <div style={{fontSize:20,fontWeight:400,color:C.text,fontFamily:"'DM Serif Display',serif",marginBottom:4}}>Lucas Trade Intel</div>
      <div style={{fontSize:9,color:C.text3,letterSpacing:3,fontFamily:"'DM Mono',monospace",marginBottom:28}}>SWING OPTIONS ASSISTANT</div>
      <div style={{width:"100%",maxWidth:260,background:C.bg3,borderRadius:999,height:4,marginBottom:10,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${C.gold},${C.goldLt})`,borderRadius:999,transition:"width 0.4s"}}/>

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("scanner");
  const [stocks,setStocks]=useState([]);
  const [scoreMap,setScoreMap]=useState({});
  const [loading,setLoading]=useState(true);
  const [loadProg,setLoadProg]=useState({done:0,total:0,current:""});
  const [filter,setFilter]=useState("All");
  const [selectedStock,setSelectedStock]=useState(null);
  const [selectedScore,setSelectedScore]=useState(null);
  const [customTickers,setCustomTickers]=useState(()=>{try{return JSON.parse(localStorage.getItem("lti_custom")||"[]");}catch{return[];}});
  const [addTicker,setAddTicker]=useState("");
  const [trades,setTrades]=useState(loadTrades);
  const [logModal,setLogModal]=useState(null);
  const [ahPicks,setAhPicks]=useState(()=>{try{return JSON.parse(localStorage.getItem("lti_ah_picks")||"null");}catch{return null;}});
  const [ahLoading,setAhLoading]=useState(false);
  const [lastUpdated,setLastUpdated]=useState(null);

  useEffect(()=>{try{localStorage.setItem("lti_custom",JSON.stringify(customTickers));}catch{}},[customTickers]);
  useEffect(()=>{saveTrades(trades);},[trades]);
  useEffect(()=>{if(ahPicks)try{localStorage.setItem("lti_ah_picks",JSON.stringify(ahPicks));}catch{}},[ahPicks]);

  const fetchAndScore=useCallback(async()=>{
    setLoading(true);
    const data=await loadAllStocks(customTickers,(d,t,c)=>setLoadProg({done:d,total:t,current:c}));
    setStocks(data);
    const spy=data.find(s=>s.ticker==="SPY");
    const qqq=data.find(s=>s.ticker==="QQQ");
    const spySig=getMarketSignal(spy);
    const qqqSig=getMarketSignal(qqq);
    const map={};
    data.forEach(s=>{map[s.ticker]=scoreStock(s,spySig,qqqSig);});
    setScoreMap(map);
    setLastUpdated(new Date());
    setLoading(false);
  },[customTickers]);

  useEffect(()=>{fetchAndScore();},[]);

  const handleAHPicks=async()=>{
    setAhLoading(true);
    const result=await getAfterHoursPicks(stocks);
    setAhPicks(result);
    setAhLoading(false);
  };

  const handleStockClick=(stock,score)=>{setSelectedStock(stock);setSelectedScore(score);};
  const handleLogTrade=(stock,score)=>{setLogModal({stock,score});};
  const handleSaveTrade=(trade)=>{setTrades(p=>[trade,...p]);};
  const handleUpdateTrade=(id,updates)=>{setTrades(p=>p.map(t=>t.id===id?{...t,...updates}:t));};
  const handleDeleteTrade=(id)=>{setTrades(p=>p.filter(t=>t.id!==id));};

  const addCustomTicker=()=>{
    const t=addTicker.toUpperCase().trim();
    if(t&&!customTickers.includes(t)&&!ALL_TICKERS.includes(t)){setCustomTickers(p=>[...p,t]);setAddTicker("");}
  };

  if(loading) return <LoadingScreen progress={loadProg.done} total={loadProg.total} current={loadProg.current}/>;

  // Filter and section stocks
  const filtered=stocks.filter(s=>{
    if(!scoreMap[s.ticker]) return false;
    if(filter==="All") return true;
    if(filter==="Custom") return customTickers.includes(s.ticker);
    return WATCHLIST[filter]?.includes(s.ticker);
  });

  const bySection=(sec)=>filtered.filter(s=>scoreMap[s.ticker]?.section===sec).sort((a,b)=>scoreMap[b.ticker].score-scoreMap[a.ticker].score);
  const weeklyCall=bySection("weeklyCall");
  const monthlyCall=bySection("monthlyCall");
  const weeklyPut=bySection("weeklyPut");
  const monthlyPut=bySection("monthlyPut");
  const waitList=bySection("wait");
  const skipList=bySection("skip");

  const tradeCount=weeklyCall.length+monthlyCall.length+weeklyPut.length+monthlyPut.length;
  const liveCount=stocks.filter(s=>s.live).length;

  const NAVS=[
    {id:"scanner",icon:"⊞",label:"Scanner"},
    {id:"picks",icon:"🌙",label:"AH Picks"},
    {id:"tracker",icon:"📋",label:"Tracker"},
  ];

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,maxWidth:480,margin:"0 auto"}}>
      {selectedStock&&<StockDetail stock={selectedStock} scoreData={selectedScore} onClose={()=>{setSelectedStock(null);setSelectedScore(null);}} onLogTrade={handleLogTrade}/>}
      {logModal&&<LogTradeModal stock={logModal.stock} scoreData={logModal.score} onSave={handleSaveTrade} onClose={()=>setLogModal(null)}/>}

      {/* Header */}
      <div style={{padding:"14px 16px 10px",borderBottom:`1px solid ${C.border}`,background:C.bg,position:"sticky",top:0,zIndex:50,backdropFilter:"blur(20px)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <Logo/>
          <button onClick={fetchAndScore} style={{...ghostBtn,padding:"7px 12px",fontSize:12,display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:14}}>⟳</span> Refresh
          </button>
        </div>
        {/* Market mood */}
        <div style={{display:"flex",gap:6,marginBottom:5}}>
          {[
            ["TRADE",tradeCount,C.green],
            ["WAIT",waitList.length,C.amber],
            ["SKIP",skipList.length,C.red],
            ["LIVE",`${liveCount}/${stocks.length}`,C.gold]
          ].map(([l,v,c])=>(
            <div key={l} style={{flex:1,background:C.bg2,borderRadius:10,padding:"7px 4px",textAlign:"center",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:9,color:c,fontFamily:"'DM Mono',monospace",marginBottom:2}}>{l}</div>
              <div style={{fontSize:13,fontWeight:600,color:c,fontFamily:"'DM Mono',monospace"}}>{v}</div>
            </div>
          ))}
        </div>
        {lastUpdated&&<div style={{fontSize:9,color:C.text3,fontFamily:"'DM Mono',monospace"}}><span style={{width:6,height:6,borderRadius:"50%",background:liveCount>0?C.green:C.text3,display:"inline-block",marginRight:4,verticalAlign:"middle"}}/>{lastUpdated.toLocaleTimeString()} · {liveCount} Tradier live feeds</div>}
      </div>

      {/* Nav */}
      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.bg,position:"sticky",top:108,zIndex:49}}>
        {NAVS.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,padding:"11px 8px",border:"none",cursor:"pointer",background:"transparent",borderBottom:tab===n.id?`2px solid ${C.gold}`:"2px solid transparent",color:tab===n.id?C.goldLt:C.text2,fontSize:12,fontWeight:tab===n.id?600:400,transition:"all 0.15s"}}>
            <div style={{fontSize:14,marginBottom:2}}>{n.icon}</div>{n.label}
          </button>
        ))}
      </div>

      {/* ── SCANNER ── */}
      {tab==="scanner"&&(
        <div style={{padding:16}}>
          {/* Filters */}
          <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:6,marginBottom:14}}>
            {["All","AI & Chips","AI Software","Quantum","Space & LEO","Nuclear","Energy","EV & Battery","Commodities","Macro ETFs","Crypto","Custom"].map(f=>(
              <button key={f} style={fBtn(filter===f)} onClick={()=>setFilter(f)}>{f}</button>
            ))}
          </div>

          {/* Market Mood Banner */}
          {stocks.find(s=>s.ticker==="SPY")&&(()=>{
            const spy=stocks.find(s=>s.ticker==="SPY");
            const qqq=stocks.find(s=>s.ticker==="QQQ");
            const spySig=getMarketSignal(spy);
            const qqqSig=getMarketSignal(qqq);
            const mood=spySig==="bull"&&qqqSig==="bull"?"BULLISH":spySig==="bear"&&qqqSig==="bear"?"BEARISH":"MIXED";
            const mc=mood==="BULLISH"?C.green:mood==="BEARISH"?C.red:C.amber;
            return(
              <div style={{background:`${mc}10`,border:`1px solid ${mc}25`,borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,color:mc,fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:2}}>MARKET MOOD</div>
                  <div style={{fontSize:13,fontWeight:600,color:mc}}>{mood==="BULLISH"?"▲ Markets are bullish — favor call spreads":mood==="BEARISH"?"▼ Markets are bearish — favor put spreads":"◆ Mixed signals — be selective, higher bar to trade"}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:10,color:C.text3,fontFamily:"'DM Mono',monospace"}}>SPY {spy.change>=0?"+":""}{spy.change?.toFixed(1)}%</div>
                  <div style={{fontSize:10,color:C.text3,fontFamily:"'DM Mono',monospace"}}>QQQ {qqq?.change>=0?"+":""}{qqq?.change?.toFixed(1)}%</div>
                </div>
              </div>
            );
          })()}

          {/* Sections */}
          <SectionCard title="BEST WEEKLY CALL DEBIT SPREADS" color={C.green} emoji="📈" stocks={weeklyCall} scoreMap={scoreMap} onClick={handleStockClick}/>
          <SectionCard title="BEST MONTHLY CALL DEBIT SPREADS" color={C.green} emoji="📅" stocks={monthlyCall} scoreMap={scoreMap} onClick={handleStockClick}/>
          <SectionCard title="BEST WEEKLY PUT DEBIT SPREADS" color={C.red} emoji="📉" stocks={weeklyPut} scoreMap={scoreMap} onClick={handleStockClick}/>
          <SectionCard title="BEST MONTHLY PUT DEBIT SPREADS" color={C.red} emoji="🗓" stocks={monthlyPut} scoreMap={scoreMap} onClick={handleStockClick}/>
          <SectionCard title="WAIT — GOOD SETUP, NOT YET" color={C.amber} emoji="⏳" stocks={waitList} scoreMap={scoreMap} onClick={handleStockClick} defaultCollapsed={true}/>
          <SectionCard title="AVOID / BAD SETUP" color={C.text3} emoji="✗" stocks={skipList} scoreMap={scoreMap} onClick={handleStockClick} defaultCollapsed={true}/>

          {tradeCount===0&&waitList.length===0&&(
            <div style={{textAlign:"center",padding:40,color:C.text3}}>
              <div style={{fontSize:32,marginBottom:12}}>⊞</div>
              <div style={{fontSize:14,color:C.text2,marginBottom:6}}>No strong setups right now</div>
              <div style={{fontSize:12,lineHeight:1.7}}>Market data may be limited. Try refreshing during market hours (9:30am–4pm ET) for live analysis.</div>
            </div>
          )}

          {/* Add Ticker */}
          <div style={card}>
            <div style={{padding:"10px 16px",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.text2,letterSpacing:2,fontFamily:"'DM Mono',monospace"}}>+ ADD TICKER</div>
            <div style={{padding:12,display:"flex",gap:8}}>
              <input style={{...inp,flex:1}} placeholder="e.g. COIN" value={addTicker} onChange={e=>setAddTicker(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&addCustomTicker()}/>
              <button style={ghostBtn} onClick={addCustomTicker}>Add</button>
            </div>
            {customTickers.length>0&&(
              <div style={{padding:"0 12px 12px",display:"flex",flexWrap:"wrap",gap:6}}>
                {customTickers.map(t=>(
                  <span key={t} style={{background:"rgba(201,168,76,0.1)",border:`1px solid ${C.gold}30`,borderRadius:8,padding:"3px 10px",fontSize:12,color:C.goldLt,display:"flex",alignItems:"center",gap:6}}>
                    {t}<span onClick={()=>setCustomTickers(p=>p.filter(x=>x!==t))} style={{cursor:"pointer",color:C.red,fontSize:14}}>×</span>
                  </span>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── AFTER HOURS PICKS ── */}
      {tab==="picks"&&(
        <div style={{padding:16}}>
          <div style={{background:"rgba(59,130,246,0.06)",border:`1px solid rgba(59,130,246,0.2)`,borderRadius:12,padding:14,marginBottom:14,fontSize:13,color:C.text2,lineHeight:1.7}}>
            🌙 After Hours swing options analysis. Uses chart patterns, scoring, and news sentiment to find the best debit spread setups for the coming week — works anytime, even when the market is closed.
          </div>
          <button onClick={handleAHPicks} disabled={ahLoading} style={{...goldBtn,marginTop:0,marginBottom:14,background:"linear-gradient(135deg,#3b82f6,#60a5fa,#3b82f6)",boxShadow:"0 4px 20px rgba(59,130,246,0.25)"}}>
            {ahLoading?"Analyzing setups…":"🌙 Generate After Hours Picks"}
          </button>
          {ahLoading&&(
            <div style={{textAlign:"center",padding:28,color:"#60a5fa",fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:1}}>
              <div style={{fontSize:22,display:"inline-block",animation:"spin 1s linear infinite",marginBottom:8}}>◌</div>
              <div>Scoring all setups and finding best spreads…</div>
            </div>
          )}
          {ahPicks&&!ahLoading&&(
            <>
              <AHPickCard pick={ahPicks.weekly} label="AFTER HOURS — WEEKLY SPREAD (7–14 DTE)"/>
              <AHPickCard pick={ahPicks.monthly} label="AFTER HOURS — MONTHLY SPREAD (21–45 DTE)"/>
            </>
          )}
          {!ahPicks&&!ahLoading&&(
            <div style={{textAlign:"center",padding:40,color:C.text3}}>
              <div style={{fontSize:36,marginBottom:12}}>🌙</div>
              <div style={{fontSize:14,color:C.text2,marginBottom:6}}>No picks yet</div>
              <div style={{fontSize:12,lineHeight:1.7}}>Tap the button above to analyze all setups and get the best debit spread trades for the week.</div>
            </div>
          )}
        </div>
      )}

      {/* ── TRACKER ── */}
      {tab==="tracker"&&(
        <TradeTrackerTab trades={trades} onUpdateTrade={handleUpdateTrade} onDeleteTrade={handleDeleteTrade}/>
      )}

      <div style={{padding:"16px",borderTop:`1px solid ${C.border}`,textAlign:"center"}}>
        <div style={{fontSize:9,color:C.text3,fontFamily:"'DM Mono',monospace",lineHeight:2,letterSpacing:0.5}}>
          Lucas Trade Intel · Swing Options Assistant<br/>
          For informational purposes only · Not financial advice<br/>
          Options trading involves substantial risk · © Lucas Heating LLC
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
